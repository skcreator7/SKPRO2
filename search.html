        const tl='https://t.me/'+BOT_USERNAME+'?start='+encodeURIComponent(sp);
        const pn=String(en).padStart(2,'0'),bd=!hasUserSeenRedirect?'<span class="episode-badge">NEW</span>':'';
        h+='<div class="episode-chip '+getEpisodeColorClass(en)+'" onclick="handleQualityClick(\''+tl.replace(/'/g,"\\'")+'\')">EP '+pn+(esz?' <span class="episode-chip-size">'+esz+'</span>':'')+bd+'</div>';
    });
    return h+'</div></div>';
}

function handleQualityClick(tl){
    if(!tl)return;triggerBackgroundSmartlink();
    if(hasUserSeenRedirect){window.open(tl,'_blank');return;}
    localStorage.setItem(REDIRECT_KEY,'true');hasUserSeenRedirect=true;pendingTelegramLink=tl;redirectCountdown=3;
    document.getElementById('redirectTimer').textContent=3;document.getElementById('redirectProgressBar').style.width='0%';
    document.getElementById('redirectOverlay').classList.add('active');
    setTimeout(()=>{document.getElementById('redirectProgressBar').style.width='100%';},50);
    if(redirectTimeout)clearInterval(redirectTimeout);
    redirectTimeout=setInterval(()=>{redirectCountdown--;document.getElementById('redirectTimer').textContent=redirectCountdown;if(redirectCountdown<=0){clearInterval(redirectTimeout);window.open(pendingTelegramLink,'_blank');closeRedirect();}},1000);
}
function toggleEpisodes(i){const d=document.getElementById('ed-'+i);if(d)d.style.display=d.style.display==='block'?'none':'block';}
function closeRedirect(){if(redirectTimeout){clearInterval(redirectTimeout);redirectTimeout=null;}document.getElementById('redirectOverlay').classList.remove('active');}

async function fetchAPI(q,p){for(let i=0;i<API_ENDPOINTS.length;i++){try{const r=await fetch(API_ENDPOINTS[i]+'/api/search?query='+encodeURIComponent(q)+'&page='+p+'&limit='+RESULTS_PER_PAGE,{signal:AbortSignal.timeout(10000)});if(r.ok){const d=await r.json();if(d.status==='success')return d;}}catch(e){}}return null;}

async function performSearchWithPopup(page=1){
    const rc=document.getElementById('resultsContainer'),ri=document.getElementById('resultsInfo'),pc=document.getElementById('paginationContainer');
    let q=getValidSearchQuery();
    if(!q){rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i><h4>Enter a search term</h4></div>';return;}
    currentQuery=q;currentPage=page;
    rc.innerHTML='<div class="results-loading"><div class="spinner"></div><p style="color:#00ccff;">Searching...</p></div>';
    const ck=q+'-'+page;
    if(searchCache.has(ck)){const c=searchCache.get(ck);renderResults(c.results,c.pagination);return;}
    try{
        const d=await fetchAPI(q,page);
        if(d&&d.results&&d.results.length>0){
            const{grouped,standalone}=groupEpisodesBySeries(d.results);
            searchCache.set(ck,{results:{grouped,standalone},pagination:d.pagination});
            renderResults({grouped,standalone},d.pagination);
        }else{rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i><h4>No results found</h4></div>';}
    }catch(e){rc.innerHTML='<div class="error-state"><i class="fas fa-exclamation-triangle fa-3x mb-3" style="color:#ff6b6b;"></i><h4>Connection Error</h4><button onclick="performSearchWithPopup('+page+')" style="background:#00ccff;border:none;padding:10px 25px;border-radius:4px;color:#000;font-weight:600;cursor:pointer;">Retry</button></div>';}
}

function renderResults(pr,pag){
    const rc=document.getElementById('resultsContainer'),ri=document.getElementById('resultsInfo'),pc=document.getElementById('paginationContainer');
    const{grouped:series,standalone}=pr;
    const total=(series?series.length:0)+(standalone?standalone.length:0);
    if(total===0){rc.innerHTML='<div class="error-state"><h4>No results found</h4></div>';return;}
    if(ri&&pag)ri.innerHTML='Found <strong>'+total+'</strong> results · Page '+pag.current_page+' of '+pag.total_pages,ri.style.display='block';
    let h='',ci=0;
    if(series)series.forEach(s=>{
        const st=s.seriesName,tu=s.thumbnail||FALLBACK_THUMBNAIL,eps=s.episodes||[],ec=eps.length;
        let hf=s.has_file;if(!hf&&ec)hf=eps.some(e=>e.has_file||e.file_size);
        const fmi=eps[0]?getMsgId(eps[0]):'0';
        h+='<div class="result-card"><div class="result-thumbnail-top"><div class="thumbnail-container" onclick="triggerAdLink()"><img src="'+tu+'" alt="'+escapeHtml(st)+'" onerror="this.src=\''+FALLBACK_THUMBNAIL+'\'"><div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>'+(hf?'<div class="video-file-badge">SK4FiLM</div>':'')+'</div></div><h3>'+escapeHtml(st)+' <small>('+ec+' eps)</small></h3>';
        if(s.post_content)h+=createPostContent(s.post_content,ci);
        h+='<div class="action-buttons-container"><a href="view.html?channel_id='+FILE_CHANNEL_ID+'&message_id='+fmi+'" target="_blank" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a><button class="btn-download-main" onclick="toggleEpisodes('+ci+')"><i class="fas fa-download"></i> Episodes <span class="episode-count-badge">'+ec+'</span></button></div>';
        h+=generateEpisodesDropdown(eps,ci)+'</div>';ci++;
    });
    if(standalone)standalone.forEach(r=>{
        const t=r.title||'Untitled',tu=r.thumbnail_url||r.poster_url||FALLBACK_THUMBNAIL;
        const hf=r.has_file||r.file_size,msgId=getMsgId(r);
        h+='<div class="result-card"><div class="result-thumbnail-top"><div class="thumbnail-container" onclick="triggerAdLink()"><img src="'+tu+'" alt="'+escapeHtml(t)+'" onerror="this.src=\''+FALLBACK_THUMBNAIL+'\'"><div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>'+(hf?'<div class="video-file-badge">SK4FiLM</div>':'')+'</div></div><h3>'+escapeHtml(t)+'</h3>';
        if(r.post_content||r.content)h+=createPostContent(r.post_content||r.content,ci);
        const link='https://t.me/'+BOT_USERNAME+'?start='+FILE_CHANNEL_ID+'_'+msgId;
        h+='<div class="action-buttons-container"><a href="view.html?channel_id='+FILE_CHANNEL_ID+'&message_id='+msgId+'" target="_blank" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a><button class="btn-download-main" onclick="handleQualityClick(\''+link+'\')"><i class="fas fa-download"></i> Download</button></div></div>';ci++;
    });
    rc.innerHTML=h;
    if(pag&&pag.total_pages>1)renderPagination(pag);else pc.innerHTML='';
}

function renderPagination(pag){
    const pc=document.getElementById('paginationContainer');if(!pc)return;
    let p='<nav><ul style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;list-style:none;padding:0;margin:20px 0;">';
    p+='<li><a class="page-link '+(pag.has_previous?'':'disabled')+'" onclick="'+(pag.has_previous?'changePage('+(pag.current_page-1)+')':'')+'">«</a></li>';
    for(let i=1;i<=pag.total_pages;i++){if(i===1||i===pag.total_pages||(i>=pag.current_page-2&&i<=pag.current_page+2))p+='<li class="page-item '+(i===pag.current_page?'active':'')+'"><a class="page-link" onclick="changePage('+i+')">'+i+'</a></li>';else if(i===pag.current_page-3||i===pag.current_page+3)p+='<li><span style="padding:8px 12px;color:rgba(255,255,255,0.3);">…</span></li>';}
    p+='<li><a class="page-link '+(pag.has_next?'':'disabled')+'" onclick="'+(pag.has_next?'changePage('+(pag.current_page+1)+')':'')+'">»</a></li></ul></nav>';pc.innerHTML=p;
}

window.changePage=function(page){if(page>0){performSearchWithPopup(page);window.scrollTo({top:0,behavior:'smooth'});}};
document.getElementById('searchButton').addEventListener('click',(e)=>{e.preventDefault();performSearchWithPopup(1);});
document.getElementById('searchInput').addEventListener('keypress',(e)=>{if(e.key==='Enter'){e.preventDefault();performSearchWithPopup(1);}});
window.addEventListener('load',()=>{const p=new URLSearchParams(window.location.search);const q=p.get('query');if(q){document.getElementById('searchInput').value=q;performSearchWithPopup(parseInt(p.get('page'))||1);}});

window.toggleEpisodes=toggleEpisodes;window.handleQualityClick=handleQualityClick;
window.closeRedirect=closeRedirect;window.performSearchWithPopup=performSearchWithPopup;
window.toggleMenu=toggleMenu;window.triggerAdLink=triggerAdLink;
</script>
<script type="text/javascript">aclib.runAutoTag({zoneId:'upm8dczty'});</script>
