// Group episodes by series
function groupEpisodesBySeries(results){
    const grouped=[],seriesMap=new Map(),standalone=[];
    results.forEach(r=>{
        const t=r.title||'';
        const m=t.match(/(.*?)\s*[\(\[\s]*(?:E(?:p(?:isode)?)?[\.\s\-]*(\d+)|S(\d+)\s*E(?:p(?:isode)?)?[\.\s\-]*(\d+))/i);

    return{grouped,standalone};
}

function getValidSearchQuery(){const s=document.getElementById('searchInput');return s?s.value.trim().replace(/\s+/g,' '):'';}
function triggerBackgroundSmartlink(){try{const a=document.createElement('a');a.href=SMARTLINK_LINK;a.target='_blank';a.rel='noopener noreferrer';a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);}catch(e){}}

// ====== FIXED PAGINATION WITH GROUPED RESULTS ======
async function performSearchWithPopup(page=1){
    const rc=document.getElementById('resultsContainer'),ri=document.getElementById('resultsInfo'),pc=document.getElementById('paginationContainer');
    let q=getValidSearchQuery();
    if(!q){if(rc)rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i><h4>Enter a search term</h4><p>Example: Animal, Jawan, Pathaan</p></div>';if(ri)ri.style.display='none';if(pc)pc.innerHTML='';return;}
    currentQuery=q;currentPage=page;window.history.pushState({},'',`?query=${encodeURIComponent(q)}&page=${page}`);
    if(rc)rc.innerHTML='<div class="results-loading"><div class="spinner"></div><p style="color:#00ccff;">Searching...</p></div>';
    if(ri)ri.style.display='none';if(pc)pc.innerHTML='';
    const ck=`${q}-${page}`;
    if(searchCache.has(ck)){const c=searchCache.get(ck);renderResults(c.results,c.groupedPagination);return;}
    try{
        const d=await fetchAPI(q,page);
        if(d&&d.results&&d.results.length>0){
            const{grouped,standalone}=groupEpisodesBySeries(d.results);
            const pr={series:grouped,standalone};
            
            // Calculate correct pagination based on GROUPED results
            const totalGroupedCards = (grouped?grouped.length:0) + (standalone?standalone.length:0);
            const totalGroupedPages = Math.ceil(totalGroupedCards / RESULTS_PER_PAGE) || 1;
            
            // Create corrected pagination object
            const groupedPagination = {
                current_page: page,
                total_pages: totalGroupedPages,
                total_results: d.pagination.total_results, // Keep original total
                has_previous: page > 1,
                has_next: page < totalGroupedPages
            };
            
            searchCache.set(ck,{results:pr,groupedPagination});
            renderResults(pr,groupedPagination);
        }else{if(rc)rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i><h4>No results found</h4></div>';if(ri)ri.style.display='none';}
    }catch(e){if(rc)rc.innerHTML='<div class="error-state"><i class="fas fa-exclamation-triangle fa-3x mb-3" style="color:#ff6b6b;"></i><h4>Connection Error</h4><button onclick="performSearchWithPopup('+page+')" style="background:#00ccff;border:none;padding:10px 25px;border-radius:4px;color:#000;font-weight:600;margin-top:10px;cursor:pointer;">Retry</button></div>';}
}

async function fetchAPI(q,p){for(let i=0;i<API_ENDPOINTS.length;i++){try{const r=await fetch(`${API_ENDPOINTS[i]}/api/search?query=${encodeURIComponent(q)}&page=${p}&limit=${RESULTS_PER_PAGE}`,{signal:AbortSignal.timeout(10000)});if(r.ok){const d=await r.json();if(d.status==='success')return d;}}catch(e){continue;}}return null;}

function escapeHtml(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

function formatPostContent(content) {
    if(!content)return'';
    let formatted=escapeHtml(content);
    formatted=formatted.replace(/\n/g,'<br>');
    formatted=formatted.replace(/(https?:\/\/[^\s<]+)/g,function(m){return'<a href="'+m+'" target="_blank" rel="noopener noreferrer" style="color:#00ccff;text-decoration:underline;font-weight:500;">'+m+'</a>';});
    formatted=formatted.replace(/(?:https?:\/\/)?(?:www\.)?(t\.me|telegram\.me|telegram\.dog)\/([a-zA-Z0-9_]+)(?:\/(\d+))?/g,function(m){const u=m.startsWith('http')?m:'https://'+m;return'<a href="'+u+'" target="_blank" rel="noopener noreferrer" style="color:#00ccff;text-decoration:underline;font-weight:500;">'+m+'</a>';});
    formatted=formatted.replace(/@(?!sk4film\b)([a-zA-Z0-9_]+)/g,'<a href="https://t.me/$1" target="_blank" rel="noopener noreferrer" style="color:#00ccff;text-decoration:underline;font-weight:600;">@$1</a>');
    formatted=formatted.replace(/@sk4film\b/g,'<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color:#00ccff;text-decoration:underline;font-weight:600;">@sk4film</a>');
    return formatted;
}

function createPostContent(content,index){
    if(!content||!content.trim())return'';
    const isLong=content.length>1200;
    let h='<div class="result-post-content" id="post-content-'+index+'" style="position:relative;">';
    h+='<div class="post-text" style="max-height:'+(isLong?'150px':'none')+';overflow:hidden;transition:max-height 0.4s ease-in-out;">';
    h+=formatPostContent(content);
    h+='</div>';
    if(isLong){
        h+='<div class="fade-effect" style="position:absolute;bottom:40px;left:0;right:0;height:40px;background:linear-gradient(transparent,#0a0a0a);pointer-events:none;"></div>';
        h+='<button class="show-more-btn" onclick="var p=document.getElementById(\'post-content-'+index+'\');var t=p.querySelector(\'.post-text\');var f=p.querySelector(\'.fade-effect\');var b=p.querySelector(\'.show-more-btn\');if(t.style.maxHeight===\'none\'){t.style.maxHeight=\'150px\';f.style.display=\'block\';b.innerHTML=\'<i class=\\\'fas fa-chevron-down\\\'></i> Show More ↓\';}else{t.style.maxHeight=\'none\';f.style.display=\'none\';b.innerHTML=\'<i class=\\\'fas fa-chevron-up\\\'></i> Show Less ↑\';}" id="post-toggle-'+index+'" aria-label="Toggle content"><i class="fas fa-chevron-down"></i> Show More ↓</button>';
    }
    h+='</div>';
    return h;
}

function formatSize(b){if(!b||b===0)return'';const k=1024,s=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];}

function generateEpisodesDropdown(episodes,index){
    if(!episodes||!Array.isArray(episodes)||episodes.length===0)return'';
    let h='<div class="episodes-dropdown" id="episodes-dropdown-'+index+'" style="display:none;"><div class="episodes-grid">';
    episodes.forEach((ep,epIndex)=>{
        const epNum=ep.episodeNumber||(epIndex+1);
        const epSize=ep.file_size?formatSize(ep.file_size):'';
        let epMsgId=String(ep.real_message_id||ep.message_id||ep.id||'0').replace(/\D/g,'');
        const fileId=FILE_CHANNEL_ID+'_'+epMsgId+'_ep_'+epIndex;
        const telegramLink='https://t.me/'+BOT_USERNAME+'?start='+fileId;
        const paddedNum=String(epNum).padStart(2,'0');
        const badge=!hasUserSeenRedirect?'<span class="episode-badge">NEW</span>':'';
        h+='<div class="episode-chip" onclick="handleQualityClick(\''+telegramLink+'\')"><span class="episode-chip-label">EP '+paddedNum+'</span>'+(epSize?'<span class="episode-chip-size">'+epSize+'</span>':'')+badge+'</div>';
    });
    h+='</div></div>';return h;
}

function handleQualityClick(telegramLink){
    triggerBackgroundSmartlink();
    if(hasUserSeenRedirect){window.open(telegramLink,'_blank');return;}
    localStorage.setItem(REDIRECT_KEY,'true');hasUserSeenRedirect=true;
    pendingTelegramLink=telegramLink;redirectCountdown=3;
    document.getElementById('redirectTimer').textContent=redirectCountdown;
    document.getElementById('redirectSeconds').textContent=redirectCountdown;
    document.getElementById('redirectProgressBar').style.width='0%';
    document.getElementById('redirectOverlay').classList.add('active');
    setTimeout(()=>{document.getElementById('redirectProgressBar').style.width='100%';},50);
    if(redirectTimeout)clearInterval(redirectTimeout);
    redirectTimeout=setInterval(()=>{
        redirectCountdown--;
        document.getElementById('redirectTimer').textContent=redirectCountdown;
        document.getElementById('redirectSeconds').textContent=redirectCountdown;
        if(redirectCountdown<=0){clearInterval(redirectTimeout);redirectTimeout=null;window.open(pendingTelegramLink,'_blank');closeRedirect();}
    },1000);
}

function triggerAdLink(){triggerBackgroundSmartlink();}
function toggleEpisodes(index){const d=document.getElementById('episodes-dropdown-'+index);if(d)d.style.display=d.style.display==='block'?'none':'block';document.querySelectorAll('.episodes-dropdown').forEach(x=>{if(x.id!=='episodes-dropdown-'+index)x.style.display='none';});document.querySelectorAll('.quality-dropdown').forEach(x=>x.style.display='none');}
function toggleDownload(index){const d=document.getElementById('download-quality-'+index);if(d)d.style.display=d.style.display==='block'?'none':'block';document.querySelectorAll('.quality-dropdown').forEach(x=>{if(x.id!=='download-quality-'+index)x.style.display='none';});document.querySelectorAll('.episodes-dropdown').forEach(x=>x.style.display='none');}

function generateQualityOptionsHTML(qo,r){
    if(!qo||typeof qo!=='object')return'<p style="color:#999;">No options</p>';
    let h='<div style="display:flex;flex-wrap:wrap;gap:8px;">',c=0;
    let dmi=String(r.real_message_id||r.message_id||r.id||'0').replace(/\D/g,'');
    for(const[q,d]of Object.entries(qo)){
        if(d&&typeof d==='object'){
            let qmi=String(d.message_id||dmi).replace(/\D/g,'');
            if(qmi&&qmi!=='0'){
                const fi=FILE_CHANNEL_ID+'_'+qmi+'_'+q.toLowerCase().replace(/\s+/g,'_');
                const sz=d.file_size?formatSize(d.file_size):'';
                const tl='https://t.me/'+BOT_USERNAME+'?start='+fi;
                const bd=!hasUserSeenRedirect?'<span class="one-time-badge">NEW</span>':'';
                h+='<button class="quality-option-2click" onclick="handleQualityClick(\''+tl+'\')">'+q+' '+sz+' '+bd+'</button>';c++;
            }
        }
    }
    if(c===0)h+='<button class="quality-option-2click" onclick="handleQualityClick(\'https://t.me/'+BOT_USERNAME+'\')">Get from Bot</button>';
    h+='</div>';return h;
}

// ====== FIXED: Use groupedPagination instead of original pagination ======
function renderResults(pr,groupedPagination){
    const rc=document.getElementById('resultsContainer'),ri=document.getElementById('resultsInfo'),pc=document.getElementById('paginationContainer');
    if(!rc)return;
    const{series,standalone}=pr;
    const displayCount=(series?series.length:0)+(standalone?standalone.length:0);
    
    if(displayCount===0){rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i><h4>No results found</h4></div>';if(ri)ri.style.display='none';if(pc)pc.innerHTML='';return;}
    
    // Use groupedPagination for display
    if(ri&&groupedPagination){
        ri.innerHTML='Found <strong>'+displayCount+'</strong> results (grouped) · Page '+groupedPagination.current_page+' of '+groupedPagination.total_pages;
        ri.style.display='block';
    }
    
    let h='',ci=0;

    if(series&&series.length>0){
        series.forEach(s=>{
            const st=s.seriesName,tu=s.thumbnail||FALLBACK_THUMBNAIL,hf=s.has_file,pct=s.post_content||'',ec=s.episodes.length;
            let fmi='0';if(s.episodes[0])fmi=String(s.episodes[0].real_message_id||s.episodes[0].message_id||s.episodes[0].id||'0').replace(/\D/g,'');
            const sl='view.html?channel_id='+FILE_CHANNEL_ID+'&message_id='+fmi;
            h+='<div class="result-card"><div class="result-thumbnail-top"><div class="thumbnail-container" onclick="triggerAdLink()"><img src="'+tu+'" alt="'+escapeHtml(st)+'" loading="lazy" onerror="this.src=\''+FALLBACK_THUMBNAIL+'\'"><div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>'+(hf?'<div class="video-file-badge">SK4FiLM</div>':'')+'</div></div><h3 class="result-title">'+escapeHtml(st)+'</h3>';
            if(pct&&pct.trim().length>0)h+=createPostContent(pct,ci);
            if(hf){h+='<div class="action-buttons-container"><a href="'+sl+'" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a><button class="btn-download-main" onclick="toggleEpisodes('+ci+')"><i class="fas fa-download"></i> Episodes <span class="episode-count-badge">'+ec+'</span> <i class="fas fa-chevron-down ms-1"></i></button></div>';h+=generateEpisodesDropdown(s.episodes,ci);}
            else{h+='<div class="action-buttons-container"><a href="https://sk4film.vercel.app/view.html" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Live Cricket</a></div>';}
            h+='</div>';ci++;
        });
    }

    if(standalone&&standalone.length>0){
        standalone.forEach(r=>{
            const t=r.title||'Untitled',tu=r.thumbnail_url||r.poster_url||FALLBACK_THUMBNAIL,hf=r.has_file===true;
            const qo=r.qualities||r.quality_options||{},hq=Object.keys(qo).length>0;
            const pct=r.post_content||r.content||'';
            let msi=String(r.real_message_id||r.message_id||r.id||'0').replace(/\D/g,'');
            if((msi==='0'||msi==='')&&hq){const fq=Object.values(qo)[0];if(fq&&fq.message_id)msi=String(fq.message_id).replace(/\D/g,'');}
            const sl='view.html?channel_id='+FILE_CHANNEL_ID+'&message_id='+msi;
            h+='<div class="result-card"><div class="result-thumbnail-top"><div class="thumbnail-container" onclick="triggerAdLink()"><img src="'+tu+'" alt="'+escapeHtml(t)+'" loading="lazy" onerror="this.src=\''+FALLBACK_THUMBNAIL+'\'"><div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>'+(hf?'<div class="video-file-badge">SK4FiLM</div>':'')+'</div></div><h3 class="result-title">'+escapeHtml(t)+'</h3>';
            if(pct&&pct.trim().length>0)h+=createPostContent(pct,ci);
            if(hf){h+='<div class="action-buttons-container">';h+='<a href="'+sl+'" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a>';if(hq){h+='<button class="btn-download-main" onclick="toggleDownload('+ci+')"><i class="fas fa-download"></i> Download <i class="fas fa-chevron-down ms-1"></i></button></div><div class="quality-dropdown" id="download-quality-'+ci+'" style="display:none;">'+generateQualityOptionsHTML(qo,r)+'</div>';}else{const dl='https://t.me/'+BOT_USERNAME+'?start='+FILE_CHANNEL_ID+'_'+msi;h+='<button class="btn-download-main" onclick="handleQualityClick(\''+dl+'\')"><i class="fas fa-download"></i> Download</button></div>';}}
            else{h+='<div class="action-buttons-container"><a href="https://sk4film.vercel.app/view.html" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Live Cricket</a></div>';}
            h+='</div>';ci++;
        });
    }
    rc.innerHTML=h;
    
    // Render pagination using groupedPagination
    if(groupedPagination&&groupedPagination.total_pages>1)renderPagination(groupedPagination);
    else if(pc)pc.innerHTML='';
}

function renderPagination(pag){
    const pc=document.getElementById('paginationContainer');if(!pc)return;
    let p='<nav><ul style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;list-style:none;padding:0;margin:20px 0;">';
    p+='<li><a class="page-link '+(pag.has_previous?'':'disabled')+'" href="#" onclick="'+(pag.has_previous?'changePage('+(pag.current_page-1)+');return false;':'return false;')+'">«</a></li>';
    for(let i=1;i<=pag.total_pages;i++){
        if(i===1||i===pag.total_pages||(i>=pag.current_page-2&&i<=pag.current_page+2))
            p+='<li class="page-item '+(i===pag.current_page?'active':'')+'"><a class="page-link" href="#" onclick="changePage('+i+');return false;">'+i+'</a></li>';
        else if(i===pag.current_page-3||i===pag.current_page+3)
            p+='<li><span style="padding:8px 12px;color:rgba(255,255,255,0.3);">…</span></li>';
    }
    p+='<li><a class="page-link '+(pag.has_next?'':'disabled')+'" href="#" onclick="'+(pag.has_next?'changePage('+(pag.current_page+1)+');return false;':'return false;')+'">»</a></li></ul></nav>';
    pc.innerHTML=p;
}

window.changePage=function(page){if(page>0){performSearchWithPopup(page);window.scrollTo({top:0,behavior:'smooth'});}};
function closeRedirect(){if(redirectTimeout){clearInterval(redirectTimeout);redirectTimeout=null;}document.getElementById('redirectOverlay').classList.remove('active');pendingTelegramLink='';}

document.getElementById('searchButton').addEventListener('click',(e)=>{e.preventDefault();performSearchWithPopup(1);});

document.addEventListener('click',(e)=>{if(!e.target.closest('.action-buttons-container')&&!e.target.closest('.quality-dropdown')&&!e.target.closest('.episodes-dropdown')){document.querySelectorAll('.quality-dropdown,.episodes-dropdown').forEach(d=>d.style.display='none');}});

window.toggleEpisodes=toggleEpisodes;window.toggleDownload=toggleDownload;window.handleQualityClick=handleQualityClick;
window.closeRedirect=closeRedirect;window.performSearchWithPopup=performSearchWithPopup;
window.toggleMenu=toggleMenu;window.triggerAdLink=triggerAdLink;
