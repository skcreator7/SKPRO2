const FILE_CHANNEL_ID="-1001768249569",BOT_USERNAME='sk4filmbot',REDIRECT_KEY='sk4film_redirect_shown';

let currentQuery='',currentPage=1,redirectTimeout=null,redirectCountdown=3,pendingTelegramLink='';
const searchCache=new Map();

// ====== GROUP EPISODES BY SERIES ======
function groupEpisodesBySeries(results){
    const grouped=[],seriesMap=new Map(),standalone=[];
    results.forEach(r=>{
        const t=r.title||'';
        const m=t.match(/(.*?)\s*[\(\[\s]*(?:E(?:p(?:isode)?)?[\.\s\-]*(\d+)|S(\d+)\s*E(?:p(?:isode)?)?[\.\s\-]*(\d+)|Part[\.\s\-]*(\d+))/i);
        if(m){
            let sn=m[1].trim(),en=m[2]||m[4]||m[5]||'';
            sn=sn.replace(/[\(\[]\s*(?:Season|S)\s*\d+\s*[\)\]]/gi,'').trim().replace(/\s+-\s*$/g,'').trim().replace(/\s*\(\d{4}\)\s*/g,' ').trim().replace(/\s+/g,' ').trim();
            if(!en||en==='0'){standalone.push(r);return;}
            const key=sn.toLowerCase();
            if(!seriesMap.has(key)) seriesMap.set(key,{seriesName:sn,episodes:[],thumbnail:r.thumbnail_url||r.poster_url||FALLBACK_THUMBNAIL,post_content:r.post_content||r.content||'',has_file:r.has_file===true});
            const s=seriesMap.get(key);
            const msgId=String(r.real_message_id||r.message_id||r.id||'');
            const isDuplicate=s.episodes.some(ep=>{const epMsgId=String(ep.real_message_id||ep.message_id||ep.id||'');return ep.episodeNumber===en||(msgId!==''&&epMsgId!==''&&msgId===epMsgId);});
            if(!isDuplicate){s.episodes.push({...r,episodeNumber:en});if(r.thumbnail_url)s.thumbnail=r.thumbnail_url;if(!s.post_content&&(r.post_content||r.content))s.post_content=r.post_content||r.content;}
        }else{standalone.push(r);}
    });
    seriesMap.forEach(s=>{s.episodes.sort((a,b)=>(parseInt(a.episodeNumber)||0)-(parseInt(b.episodeNumber)||0));grouped.push(s);});
    return{grouped,standalone};
}

// ====== UTILITY FUNCTIONS ======
function getValidSearchQuery(){const s=document.getElementById('searchInput');return s?s.value.trim().replace(/\s+/g,' '):'';}

function escapeHtml(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function formatSize(b){if(!b||b===0)return'';const k=1024,s=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];}

// ====== COLOR CLASS FUNCTIONS ======
function getEpisodeColorClass(epNum){const num=parseInt(epNum)||0;const colorMap={1:'ep-chip-01',2:'ep-chip-02',3:'ep-chip-03',4:'ep-chip-04',5:'ep-chip-05',6:'ep-chip-06',7:'ep-chip-07',8:'ep-chip-08',9:'ep-chip-09',10:'ep-chip-10',11:'ep-chip-11',12:'ep-chip-12'};return colorMap[num]||'ep-chip-01';}

function getQualityColorClass(quality){if(!quality)return'';const q=quality.toLowerCase().replace(/[\s\.\-]/g,'');if(q.includes('4k')||q.includes('2160')||q.includes('uhd'))return'quality-4k';if(q.includes('1080')||q.includes('fullhd')||q.includes('fhd'))return'quality-1080p';if((q.includes('720')&&q.includes('hevc'))||q.includes('720phevc')||q.includes('720hevc'))return'quality-720phevc';if(q.includes('720'))return'quality-720p';if(q.includes('480'))return'quality-480p';if(q.includes('360'))return'quality-360p';if(q.includes('240'))return'quality-240p';if(q.includes('hdrip')||q.includes('hdcam')||q.includes('hdts'))return'quality-hdrip';if(q.includes('webdl')||q.includes('webrip')||q.includes('web-dl'))return'quality-webdl';if(q.includes('bluray')||q.includes('bdrip')||q.includes('bd-rip'))return'quality-bluray';return'';}

// ====== FORMAT POST CONTENT ======
function formatPostContent(content){if(!content)return'';let formatted=escapeHtml(content);formatted=formatted.replace(/\n/g,'<br>');formatted=formatted.replace(/(https?:\/\/[^\s<]+)/g,function(match){return'<a href="'+match+'" target="_blank" rel="noopener noreferrer" style="color:#00ccff;text-decoration:underline;font-weight:500;">'+match+'</a>';});formatted=formatted.replace(/(?:https?:\/\/)?(?:www\.)?(t\.me|telegram\.me|telegram\.dog)\/([a-zA-Z0-9_]+)(?:\/(\d+))?/g,function(match){const url=match.startsWith('http')?match:'https://'+match;return'<a href="'+url+'" target="_blank" rel="noopener noreferrer" style="color:#00ccff;text-decoration:underline;font-weight:500;">'+match+'</a>';});formatted=formatted.replace(/@(?!sk4film\b)([a-zA-Z0-9_]+)/g,'<a href="https://t.me/$1" target="_blank" rel="noopener noreferrer" style="color:#00ccff;text-decoration:underline;font-weight:600;">@$1</a>');formatted=formatted.replace(/@sk4film\b/g,'<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color:#00ccff;text-decoration:underline;font-weight:600;">@sk4film</a>');return formatted;}

function createPostContent(content,index){if(!content||!content.trim())return'';const isLong=content.length>1200;let html='<div class="result-post-content" id="post-content-'+index+'" style="position:relative;">';html+='<div class="post-text" style="max-height:'+(isLong?'150px':'none')+';overflow:hidden;transition:max-height 0.4s ease-in-out;">';html+=formatPostContent(content);html+='</div>';if(isLong){html+='<div class="fade-effect" style="position:absolute;bottom:40px;left:0;right:0;height:40px;background:linear-gradient(transparent,#0a0a0a);pointer-events:none;"></div>';html+='<button class="show-more-btn" onclick="var p=document.getElementById(\'post-content-'+index+'\');var t=p.querySelector(\'.post-text\');var f=p.querySelector(\'.fade-effect\');var b=p.querySelector(\'.show-more-btn\');if(t.style.maxHeight===\'none\'){t.style.maxHeight=\'150px\';f.style.display=\'block\';b.innerHTML=\'<i class=\\\'fas fa-chevron-down\\\'></i> Show More ↓\';}else{t.style.maxHeight=\'none\';f.style.display=\'none\';b.innerHTML=\'<i class=\\\'fas fa-chevron-up\\\'></i> Show Less ↑\';}" id="post-toggle-'+index+'" aria-label="Toggle content"><i class="fas fa-chevron-down"></i> Show More ↓</button>';}html+='</div>';return html;}

// ====== GENERATE EPISODES DROPDOWN (FIXED) ======
function generateEpisodesDropdown(episodes,index){
    if(!episodes||!Array.isArray(episodes)||episodes.length===0)return'';
    let h='<div class="episodes-dropdown" id="episodes-dropdown-'+index+'" style="display:none;"><div class="episodes-grid">';
    episodes.forEach((ep,epIndex)=>{
        const epNum=ep.episodeNumber||(epIndex+1);
        const epSize=ep.file_size?formatSize(ep.file_size):'';
        let epMsgId='';
        if(ep.real_message_id&&String(ep.real_message_id).replace(/\D/g,'')!=='')epMsgId=String(ep.real_message_id).replace(/\D/g,'');
        else if(ep.message_id&&String(ep.message_id).replace(/\D/g,'')!=='')epMsgId=String(ep.message_id).replace(/\D/g,'');
        else if(ep.id&&String(ep.id).replace(/\D/g,'')!=='')epMsgId=String(ep.id).replace(/\D/g,'');
        if(!epMsgId||epMsgId==='0'){console.warn('Skipping episode '+epNum+' - no valid message_id');return;}
        const startParam=FILE_CHANNEL_ID+'_'+epMsgId;
        const telegramLink='https://t.me/'+BOT_USERNAME+'?start='+encodeURIComponent(startParam);
        const paddedNum=String(epNum).padStart(2,'0');

        h+='<div class="episode-chip '+colorClass+'" onclick="handleQualityClick(\''+telegramLink.replace(/'/g,"\\'")+'\')" title="Episode '+paddedNum+(epSize?' - '+epSize:'')+'"><span class="episode-chip-label">EP '+paddedNum+'</span>'+(epSize?'<span class="episode-chip-size">'+epSize+'</span>':'')+badge+'</div>';
    });
    h+='</div></div>';return h;
}

function handleQualityClick(telegramLink){
    if(!telegramLink||typeof telegramLink!=='string'){console.error('Invalid telegram link');return;}
    console.log('Opening link:',telegramLink);
    triggerBackgroundSmartlink();
    if(hasUserSeenRedirect){window.open(telegramLink,'_blank','noopener,noreferrer');return;}

    if(timerEl)timerEl.textContent=redirectCountdown;if(secondsEl)secondsEl.textContent=redirectCountdown;if(progressBar)progressBar.style.width='0%';

}

function toggleEpisodes(index){const d=document.getElementById('episodes-dropdown-'+index);if(d)d.style.display=d.style.display==='block'?'none':'block';document.querySelectorAll('.episodes-dropdown').forEach(x=>{if(x.id!=='episodes-dropdown-'+index)x.style.display='none';});document.querySelectorAll('.quality-dropdown').forEach(x=>x.style.display='none');}

function generateQualityOptionsHTML(qo,r){
    if(!qo||typeof qo!=='object')return'<p style="color:#999;">No options</p>';

// ====== FETCH API ======
async function fetchAPI(q,p){for(let i=0;i<API_ENDPOINTS.length;i++){try{const r=await fetch(API_ENDPOINTS[i]+'/api/search?query='+encodeURIComponent(q)+'&page='+p+'&limit='+RESULTS_PER_PAGE,{signal:AbortSignal.timeout(10000)});if(r.ok){const d=await r.json();if(d.status==='success')return d;}}catch(e){continue;}}return null;}

// ====== PERFORM SEARCH ======
async function performSearchWithPopup(page=1){
    const rc=document.getElementById('resultsContainer'),ri=document.getElementById('resultsInfo'),pc=document.getElementById('paginationContainer');
    let q=getValidSearchQuery();
    if(!q){if(rc)rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i><h4>Enter a search term</h4><p>Example: Animal, Jawan, Pathaan</p></div>';if(ri)ri.style.display='none';if(pc)pc.innerHTML='';return;}
    currentQuery=q;currentPage=page;window.history.pushState({},'','?query='+encodeURIComponent(q)+'&page='+page);
    if(rc)rc.innerHTML='<div class="results-loading"><div class="spinner"></div><p style="color:#00ccff;">Searching...</p></div>';
    if(ri)ri.style.display='none';if(pc)pc.innerHTML='';
    const ck=q+'-'+page;
    if(searchCache.has(ck)){const c=searchCache.get(ck);renderResults(c.results,c.pagination);return;}
    try{
        const d=await fetchAPI(q,page);
        if(d&&d.results&&d.results.length>0){const{grouped,standalone}=groupEpisodesBySeries(d.results);const pr={series:grouped,standalone};searchCache.set(ck,{results:pr,pagination:d.pagination});renderResults(pr,d.pagination);}
        else{if(rc)rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i><h4>No results found</h4></div>';if(ri)ri.style.display='none';}
    }catch(e){if(rc)rc.innerHTML='<div class="error-state"><i class="fas fa-exclamation-triangle fa-3x mb-3" style="color:#ff6b6b;"></i><h4>Connection Error</h4><button onclick="performSearchWithPopup('+page+')" style="background:#00ccff;border:none;padding:10px 25px;border-radius:4px;color:#000;font-weight:600;margin-top:10px;cursor:pointer;">Retry</button></div>';}
}

            let fmi='0';if(s.episodes[0]){let mid=String(s.episodes[0].real_message_id||s.episodes[0].message_id||s.episodes[0].id||'0').replace(/\D/g,'');if(mid&&mid!=='0')fmi=mid;}
            const sl='view.html?channel_id='+FILE_CHANNEL_ID+'&message_id='+fmi;
            h+='<div class="result-card"><div class="result-thumbnail-top"><div class="thumbnail-container" onclick="triggerAdLink()"><img src="'+tu+'" alt="'+escapeHtml(st)+'" loading="lazy" onerror="this.src=\''+FALLBACK_THUMBNAIL+'\'"><div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>'+(hf?'<div class="video-file-badge">SK4FiLM</div>':'')+'</div></div><h3 class="result-title">'+escapeHtml(st)+'</h3>';
            if(pct&&pct.trim().length>0)h+=createPostContent(pct,ci);
            if(hf){h+='<div class="action-buttons-container"><a href="'+sl+'" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a><button class="btn-download-main" onclick="toggleEpisodes('+ci+')"><i class="fas fa-download"></i> Episodes <span class="episode-count-badge">'+ec+'</span> <i class="fas fa-chevron-down ms-1"></i></button></div>';h+=generateEpisodesDropdown(s.episodes,ci);}
            else{h+='<div class="action-buttons-container"><a href="https://sk4film.vercel.app/view.html" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Live Cricket</a></div>';}
            h+='</div>';ci++;
        });
    }
    if(standalone&&standalone.length>0){
        standalone.forEach(r=>{
            const t=r.title||'Untitled',tu=r.thumbnail_url||r.poster_url||FALLBACK_THUMBNAIL,hf=r.has_file===true;
            const qo=r.qualities||r.quality_options||{},hq=Object.keys(qo).length>0;
            const pct=r.post_content||r.content||'';
            let msi=String(r.real_message_id||r.message_id||r.id||'0').replace(/\D/g,'');
            if((msi==='0'||msi==='')&&hq){const fq=Object.values(qo)[0];if(fq&&fq.message_id)msi=String(fq.message_id).replace(/\D/g,'');}
            const sl='view.html?channel_id='+FILE_CHANNEL_ID+'&message_id='+msi;
            h+='<div class="result-card"><div class="result-thumbnail-top"><div class="thumbnail-container" onclick="triggerAdLink()"><img src="'+tu+'" alt="'+escapeHtml(t)+'" loading="lazy" onerror="this.src=\''+FALLBACK_THUMBNAIL+'\'"><div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>'+(hf?'<div class="video-file-badge">SK4FiLM</div>':'')+'</div></div><h3 class="result-title">'+escapeHtml(t)+'</h3>';
            if(pct&&pct.trim().length>0)h+=createPostContent(pct,ci);
            if(hf){h+='<div class="action-buttons-container">';h+='<a href="'+sl+'" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a>';if(hq){h+='<button class="btn-download-main" onclick="toggleDownload('+ci+')"><i class="fas fa-download"></i> Download <i class="fas fa-chevron-down ms-1"></i></button></div><div class="quality-dropdown" id="download-quality-'+ci+'" style="display:none;">'+generateQualityOptionsHTML(qo,r)+'</div>';}else{const dl='https://t.me/'+BOT_USERNAME+'?start='+FILE_CHANNEL_ID+'_'+msi;h+='<button class="btn-download-main" onclick="handleQualityClick(\''+dl+'\')"><i class="fas fa-download"></i> Download</button></div>';}}
            else{h+='<div class="action-buttons-container"><a href="https://sk4film.vercel.app/view.html" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Live Cricket</a></div>';}
            h+='</div>';ci++;
        });
    }
    rc.innerHTML=h;
    if(pag&&pag.total_pages>1)renderPagination(pag);else if(pc)pc.innerHTML='';
}

// ====== RENDER PAGINATION ======
function renderPagination(pag){const pc=document.getElementById('paginationContainer');if(!pc)return;let p='<nav><ul style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;list-style:none;padding:0;margin:20px 0;">';p+='<li><a class="page-link '+(pag.has_previous?'':'disabled')+'" href="#" onclick="'+(pag.has_previous?'changePage('+(pag.current_page-1)+');return false;':'return false;')+'">«</a></li>';for(let i=1;i<=pag.total_pages;i++){if(i===1||i===pag.total_pages||(i>=pag.current_page-2&&i<=pag.current_page+2))p+='<li class="page-item '+(i===pag.current_page?'active':'')+'"><a class="page-link" href="#" onclick="changePage('+i+');return false;">'+i+'</a></li>';else if(i===pag.current_page-3||i===pag.current_page+3)p+='<li><span style="padding:8px 12px;color:rgba(255,255,255,0.3);">…</span></li>';}p+='<li><a class="page-link '+(pag.has_next?'':'disabled')+'" href="#" onclick="'+(pag.has_next?'changePage('+(pag.current_page+1)+');return false;':'return false;')+'">»</a></li></ul></nav>';pc.innerHTML=p;}

// ====== PAGE CHANGE & CLOSE REDIRECT ======
window.changePage=function(page){if(page>0){performSearchWithPopup(page);window.scrollTo({top:0,behavior:'smooth'});}};
function closeRedirect(){if(redirectTimeout){clearInterval(redirectTimeout);redirectTimeout=null;}document.getElementById('redirectOverlay').classList.remove('active');pendingTelegramLink='';}

// ====== EVENT LISTENERS ======
document.getElementById('searchButton').addEventListener('click',(e)=>{e.preventDefault();performSearchWithPopup(1);});
document.getElementById('searchInput').addEventListener('keypress',(e)=>{if(e.key==='Enter'){e.preventDefault();performSearchWithPopup(1);}});
window.addEventListener('load',()=>{const p=new URLSearchParams(window.location.search);const q=p.get('query');if(q){document.getElementById('searchInput').value=q;performSearchWithPopup(parseInt(p.get('page'))||1);}});
document.addEventListener('click',(e)=>{if(!e.target.closest('.action-buttons-container')&&!e.target.closest('.quality-dropdown')&&!e.target.closest('.episodes-dropdown')){document.querySelectorAll('.quality-dropdown,.episodes-dropdown').forEach(d=>d.style.display='none');}});

// ====== EXPOSE TO GLOBAL SCOPE ======
window.toggleEpisodes=toggleEpisodes;window.toggleDownload=toggleDownload;window.handleQualityClick=handleQualityClick;
window.closeRedirect=closeRedirect;window.performSearchWithPopup=performSearchWithPopup;
window.toggleMenu=toggleMenu;window.triggerAdLink=triggerAdLink;
</script>
