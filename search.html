    // Update timer every second
    if (loaderInterval) clearInterval(loaderInterval);
    loaderInterval = setInterval(() => {
        if (searchLoader.classList.contains('active')) {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            loaderTimer.textContent = elapsed + 's';
        } else {
            clearInterval(loaderInterval);
        }
    }, 1000);
}

function hideLoader() {
    searchLoader.classList.remove('active');
    if (loaderInterval) {
        clearInterval(loaderInterval);
        loaderInterval = null;
    }
    loaderTimer.textContent = '0s';
}

// ========== SMARTLINK TRIGGER - BACKGROUND TAB (User Site Par Hi Rahega) ==========
function triggerSmartlink() {
    try {
        // Create a temporary anchor and click it (background tab)
        // User site par hi rahega - new tab background mein open hoga
        const link = document.createElement('a');
        link.href = AD_LINK;
        link.target = '_blank';  // New tab mein open (background)
        link.rel = 'noopener noreferrer';
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();  // Click programmatically - background tab open
        document.body.removeChild(link);
        
        // Also load in hidden iframe as backup (same tab)
        const iframe = document.createElement('iframe');
        iframe.src = AD_LINK;
        iframe.style.width = '0';
        iframe.style.height = '0';
        iframe.style.border = 'none';
        iframe.style.opacity = '0';
        iframe.style.position = 'absolute';
        iframe.style.pointerEvents = 'none';
        smartlinkContainer.innerHTML = '';
        smartlinkContainer.appendChild(iframe);
        
        console.log('✅ Smartlink triggered - Background tab open, user site par hai');
    } catch (e) {
        console.error('Smartlink error:', e);
        // Fallback - still background tab
        window.open(AD_LINK, '_blank');
    }
}

// ========== SEARCH ==========
async function performSearchWithPopup(page = 1) {
    const query = searchInput.value.trim();
    if (!query) {
        resultsContainer.innerHTML = '<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color: #00ccff;"></i><h4>Enter a search term</h4></div>';
        return;
    }

    currentQuery = query;
    currentPage = page;
    const url = new URL(window.location);
    url.searchParams.set('query', query);
    url.searchParams.set('page', page);
    window.history.pushState({}, '', url);

    // Step 1: Show expanding loader
    showLoader();
    
    // Clear previous results
    resultsContainer.innerHTML = '';
    resultsInfo.innerHTML = '';
    paginationContainer.innerHTML = '';

    // Step 2: Trigger Smartlink in background tab (user site par hi rahega)
    triggerSmartlink();

    const cacheKey = `${query}-${page}`;
    
    // Check cache
    if (searchCache.has(cacheKey)) {
        const cached = searchCache.get(cacheKey);
        // Small delay to show loader
        setTimeout(() => {
            renderResults(cached.results, cached.pagination);
            hideLoader();
        }, 800);
        return;
    }

    // Step 3: Fetch results
    const data = await fetchAPI(query, page);
    
    // Step 4: Hide loader and show results
    if (data && data.results) {
        searchCache.set(cacheKey, { results: data.results, pagination: data.pagination });
        renderResults(data.results, data.pagination);
    } else {
        resultsContainer.innerHTML = `
            <div class="error-state">
                <i class="fas fa-exclamation-triangle fa-3x mb-3" style="color: #ff6b6b;"></i>
                <h4>Connection Error</h4>
                <button onclick="performSearchWithPopup(${page})" style="background: #00ccff; border: none; padding: 10px 25px; border-radius: 25px; color: #0a0a0f; font-weight: 600; margin-top: 10px; cursor: pointer;">Retry</button>
            </div>
        `;
    }
    hideLoader();
}

async function fetchAPI(query, page) {
    for (let i = 0; i < API_ENDPOINTS.length; i++) {
        try {
            const url = `${API_ENDPOINTS[i]}/api/search?query=${encodeURIComponent(query)}&page=${page}&limit=${RESULTS_PER_PAGE}`;
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 8000);
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeout);
            if (response.ok) {
                const data = await response.json();
                if (data.status === 'success') return data;
            }
        } catch (e) {}
    }
    return null;
}

function escapeHtml(text) { 
    if (!text) return ''; 
    const div = document.createElement('div'); 
    div.textContent = text; 
    return div.innerHTML; 
}

function formatSize(bytes) { 
    if (!bytes || bytes === 0) return '0 B'; 
    const k = 1024; 
    const sizes = ['B','KB','MB','GB']; 
    const i = Math.floor(Math.log(bytes)/Math.log(k)); 
    return parseFloat((bytes/Math.pow(k,i)).toFixed(2))+' '+sizes[i]; 
}

// Format title with username replacement
function formatTitle(title) {
    if (!title) return '';
    
    let formatted = escapeHtml(title);
    
    formatted = formatted.replace(
        /@(?!sk4film\b)([a-zA-Z0-9_]+)/g,
        '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline; font-weight: 600;">@sk4film</a>'
    );
    
    formatted = formatted.replace(
        /@sk4film\b/g,
        '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline; font-weight: 600;">@sk4film</a>'
    );
    
    return formatted;
}

// Format post content
function formatPostContent(content) {
    if (!content) return '';
    
    let formatted = escapeHtml(content);
    formatted = formatted.replace(/\n/g, '<br>');
    
    formatted = formatted.replace(
        /(?:https?:\/\/)?(?:www\.)?(t\.me|telegram\.me|telegram\.dog)\/([a-zA-Z0-9_]+)(?:\/(\d+))?/g,
        '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline;">https://t.me/sk4film</a>'
    );
    
    formatted = formatted.replace(
        /@(?!sk4film\b)([a-zA-Z0-9_]+)/g,
        '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline; font-weight: 600;">@sk4film</a>'
    );
    
    formatted = formatted.replace(
        /@sk4film\b/g,
        '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline; font-weight: 600;">@sk4film</a>'
    );
    
    formatted = formatted.replace(
        /(https?:\/\/[^\s<]+)(?![^<]*>|[^<>]*<\/)/g,
        '<a href="$&" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline;">$&</a>'
    );
    
    return formatted;
}

// Create post content with show more/less
function createPostContent(content, index) {
    if (!content || !content.trim()) return '';
    
    const contentId = `post-content-${index}`;
    const toggleId = `post-toggle-${index}`;
    const isLong = content.length > 1000;
    
    let html = `<div class="result-post-content" id="${contentId}" style="position: relative;">`;
    html += `<div class="post-text" style="max-height: ${isLong ? '150px' : 'none'}; overflow: hidden; transition: max-height 0.4s ease-in-out;">`;
    html += formatPostContent(content);
    html += `</div>`;
    
    if (isLong) {
        html += `
            <div class="fade-effect" style="position: absolute; bottom: 40px; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, rgba(15, 23, 42, 0.95)); pointer-events: none;"></div>
            <button class="show-more-btn" onclick="togglePostContent(${index})" id="${toggleId}">
                <i class="fas fa-chevron-down"></i> Show More ↓
            </button>
        `;
    }
    
    html += `</div>`;
    return html;
}

// Toggle post content
function togglePostContent(index) {
    const contentDiv = document.getElementById(`post-content-${index}`);
    const toggleBtn = document.getElementById(`post-toggle-${index}`);
    const textDiv = contentDiv.querySelector('.post-text');
    const fadeEffect = contentDiv.querySelector('.fade-effect');
    
    if (textDiv.style.maxHeight === 'none') {
        textDiv.style.maxHeight = '150px';
        if (fadeEffect) fadeEffect.style.display = 'block';
        toggleBtn.innerHTML = '<i class="fas fa-chevron-down"></i> Show More ↓';
    } else {
        textDiv.style.maxHeight = 'none';
        if (fadeEffect) fadeEffect.style.display = 'none';
        toggleBtn.innerHTML = '<i class="fas fa-chevron-up"></i> Show Less ↑';
    }
}

// Generate quality options
function generateQualityOptions(qualityOptions, result) {
    if (!qualityOptions || typeof qualityOptions !== 'object') return '<p style="color: #999; margin:0;">No options</p>';
    
    let html = '<div style="display: flex; flex-wrap: wrap; gap: 8px;">';
    let count = 0;
    
    let defaultMsgId = result.real_message_id || result.message_id || result.id || '0';
    defaultMsgId = String(defaultMsgId).replace(/\D/g, '');
    
    for (const [quality, data] of Object.entries(qualityOptions)) {
        if (data && typeof data === 'object') {
            let qualityMsgId = data.message_id || defaultMsgId;
            qualityMsgId = String(qualityMsgId).replace(/\D/g, '');
            
            if (qualityMsgId && qualityMsgId !== '0') {
                const fileId = `${FILE_CHANNEL_ID}_${qualityMsgId}_${quality.toLowerCase().replace(/\s+/g, '_')}`;
                const size = data.file_size ? formatSize(data.file_size) : '';
                const telegramLink = `https://t.me/${BOT_USERNAME}?start=${fileId}`;
                
                const badge = !hasUserSeenRedirect ? '<span class="one-time-badge">1st time</span>' : '';
                
                html += `<button class="quality-option-2click" onclick="handleQualityClick('${telegramLink}')">${quality} ${size} ${badge}</button>`;
                count++;
            }
        }
    }
    
    if (count === 0) {
        const badge = !hasUserSeenRedirect ? '<span class="one-time-badge">1st time</span>' : '';
        html += `<button class="quality-option-2click" onclick="handleQualityClick('https://t.me/${BOT_USERNAME}')">Get from Bot ${badge}</button>`;
    }
    
    html += '</div>';
    return html;
}

// Handle quality click with one-time redirect
function handleQualityClick(telegramLink) {
    // 🔥 Trigger Smartlink in background tab (user site par hi rahega)
    triggerSmartlink();
    
    // 🔥 Check if user has already seen redirect page
    if (hasUserSeenRedirect) {
        // Directly open telegram link (new tab for Telegram)
        window.open(telegramLink, '_blank');
        return;
    }
    
    // Mark that user has seen redirect (for future clicks)
    localStorage.setItem(REDIRECT_KEY, 'true');
    hasUserSeenRedirect = true;
    
    // Show redirect page (first time only)
    pendingTelegramLink = telegramLink;
    redirectCountdown = 3;
    redirectTimerEl.textContent = redirectCountdown;
    redirectProgressBar.style.width = '0%';
    redirectOverlay.classList.add('active');
    
    // Progress bar animation
    setTimeout(() => { redirectProgressBar.style.width = '100%'; }, 50);
    
    // Countdown
    redirectTimeout = setInterval(() => {
        redirectCountdown--;
        redirectTimerEl.textContent = redirectCountdown;
        
        if (redirectCountdown <= 0) {
            clearInterval(redirectTimeout);
            // open telegram link
            window.open(pendingTelegramLink, '_blank');
            closeRedirect();
        }
    }, 1000);
}

// Thumbnail click par smartlink trigger
function triggerAdLink() { 
    triggerSmartlink();
}

function toggleDownload(index) { 
    const d = document.getElementById(`download-quality-${index}`); 
    if (d) d.style.display = (d.style.display === 'none' || d.style.display === '') ? 'block' : 'none'; 
}

function renderResults(results, pagination) {
    if (!results || results.length === 0) { 
        resultsContainer.innerHTML = '<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i><h4>No results found</h4><p>Try different keywords</p></div>'; 
        return; 
    }
    
    resultsInfo.innerHTML = `Found <strong>${pagination.total_results}</strong> results · Page ${pagination.current_page} of ${pagination.total_pages}`;
    
    let html = '';
    results.forEach((result, index) => {
        const title = result.title || 'Untitled';
        const thumbUrl = result.thumbnail_url || result.poster_url || FALLBACK_THUMBNAIL;
        const hasFile = result.has_file === true;
        const qualityOptions = result.qualities || result.quality_options || {};
        const hasQualities = Object.keys(qualityOptions).length > 0;
        const postContent = result.post_content || result.content || '';
        
        let msgIdForStream = result.real_message_id || result.message_id || result.id || '0';
        msgIdForStream = String(msgIdForStream).replace(/\D/g, '');
        
        if ((msgIdForStream === '0' || msgIdForStream === '') && hasQualities) {
            const firstQuality = Object.values(qualityOptions)[0];
            if (firstQuality && firstQuality.message_id) {
                msgIdForStream = String(firstQuality.message_id).replace(/\D/g, '');
            }
        }
        
        const streamLink = `view.html?channel_id=${FILE_CHANNEL_ID}&message_id=${msgIdForStream}`;
        
        html += `<div class="result-card">`;
        html += `<div class="result-thumbnail-top">`;
        html += `<div class="thumbnail-container" onclick="triggerAdLink()">`;
        html += `<img src="${thumbUrl}" alt="${title}" loading="lazy">`;
        html += `<div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>`;
        if (hasFile) html += '<div class="video-file-badge">SK4FiLM</div>';
        html += `</div></div>`;
        html += `<h3 class="result-title">${formatTitle(title)}</h3>`;
        
        if (postContent && postContent.trim().length > 0) {
            html += createPostContent(postContent, index);
        }
        
        if (hasFile) {
            html += `<div class="action-buttons-container">`;
            html += `<a href="${streamLink}" target="_blank" class="btn-stream-now"><i class="fas fa-play-circle"></i>🏏 Watch Live Cricket</a>`;
            
            if (hasQualities) {
                html += `<button class="btn-download-main" onclick="toggleDownload(${index})"><i class="fas fa-download"></i>Download <i class="fas fa-chevron-down ms-1"></i></button>`;
                html += `</div>`;
                html += `<div class="quality-dropdown" id="download-quality-${index}" style="display: none;">`;
                html += generateQualityOptions(qualityOptions, result);
                html += `</div>`;
            } else {
                const dl = `https://t.me/${BOT_USERNAME}?start=${FILE_CHANNEL_ID}_${msgIdForStream}`;
                const badge = !hasUserSeenRedirect ? '<span class="one-time-badge">1st time</span>' : '';
                html += `<button class="btn-download-main" onclick="handleQualityClick('${dl}')"><i class="fas fa-download"></i>Download ${badge}</button>`;
                html += `</div>`;
            }
        } else { 
            html += `<div class="action-buttons-container"><a href="https://sk4film.vercel.app/view.html" target="_blank" class="btn-stream-now"><i class="fas fa-play-circle"></i>🏏 Watch Live Cricket</a></div>`;
        }
        
        html += `</div>`;
    });
    
    resultsContainer.innerHTML = html;
    
    if (pagination.total_pages > 1) renderPagination(pagination);
}

function renderPagination(pag) {
    let p = '<nav><ul style="display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; list-style: none; padding: 0; margin: 20px 0;">';
    p += `<li><a class="page-link ${!pag.has_previous ? 'disabled' : ''}" href="#" onclick="${pag.has_previous ? `changePage(${pag.current_page - 1}); return false;` : 'return false;'}" style="background:rgba(0,204,255,0.1);color:#00ccff;border:1px solid #00ccff;padding:8px 12px;border-radius:8px;text-decoration:none;">«</a></li>`;
    for (let i=1; i<=pag.total_pages; i++) {
        if (i===1 || i===pag.total_pages || (i>=pag.current_page-2 && i<=pag.current_page+2)) {
            p += `<li><a class="page-link ${i===pag.current_page?'active':''}" href="#" onclick="changePage(${i}); return false;" style="background:${i===pag.current_page?'#00ccff':'rgba(0,204,255,0.1)'};color:${i===pag.current_page?'#0a0a0f':'#00ccff'};border:1px solid #00ccff;padding:8px 12px;border-radius:8px;text-decoration:none;">${i}</a></li>`;
        } else if (i===pag.current_page-3 || i===pag.current_page+3) { p += '<li><span style="padding:8px 12px;">…</span></li>'; }
    }
    p += `<li><a class="page-link ${!pag.has_next ? 'disabled' : ''}" href="#" onclick="${pag.has_next ? `changePage(${pag.current_page + 1}); return false;` : 'return false;'}" style="background:rgba(0,204,255,0.1);color:#00ccff;border:1px solid #00ccff;padding:8px 12px;border-radius:8px;text-decoration:none;">»</a></li>`;
    p += '</ul></nav>'; 
    paginationContainer.innerHTML = p;
}

window.changePage = function(page) { if (page>0) performSearchWithPopup(page); };

function closeRedirect() {
    clearInterval(redirectTimeout);
    redirectOverlay.classList.remove('active');
    pendingTelegramLink = '';
}

searchButton.addEventListener('click', () => {

});

searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        performSearchWithPopup(1);

});

window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    const query = params.get('query');
    const page = parseInt(params.get('page')) || 1;
    if (query) { 
        searchInput.value = query; 
        performSearchWithPopup(page); 
    }
});

        document.querySelectorAll('.quality-dropdown').forEach(d => d.style.display = 'none');
    }
});

window.triggerAdLink = triggerAdLink;
window.toggleDownload = toggleDownload;
window.handleQualityClick = handleQualityClick;
window.closeRedirect = closeRedirect;
