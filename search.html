            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Menu dropdown black */
        .menu-dropdown {
            background: #000 !important;
        }
