        .svg-loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s ease;
            pointer-events: none;
        }
        .svg-loader-container.active {
            visibility: visible;
            opacity: 1;
            pointer-events: all;
        }
        
        .circular-loader {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, #00ccff, #0066ff, #ff0000, transparent);
            animation: rotateRing 1.5s linear infinite;
        }
        
        .loader-ring::before {
            content: '';
            position: absolute;
            inset: 4px;
            background: rgba(10, 10, 15, 0.8);
            border-radius: 50%;
        }
        
        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader-inner {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,204,255,0.3);
            animation: innerPulse 2s ease-in-out infinite;
        }
        
        .loader-inner object {
            width: 100px;
            height: 100px;
            pointer-events: none;
        }
        
        @keyframes innerPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(0,204,255,0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(0,204,255,0.6);
            }

<script>
function showLoader() {
    const ld = document.getElementById('svgLoader');
    if(ld) {
        ld.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
}
function hideLoader() {
    const ld = document.getElementById('svgLoader');
    if(ld) { ld.classList.remove('active'); document.body.style.overflow = ''; }
}

function openStream(url, title) {
    const modal = document.getElementById('streamModal');
    const iframe = document.getElementById('streamIframe');
    const titleEl = document.getElementById('streamTitle');
    
    if(!modal || !iframe) return;
    
    titleEl.textContent = title || 'Now Playing';
    
    // Handle streaam.net links specially (they work directly)
    let embedUrl = url;
    
    if(url.includes('youtube.com/watch') || url.includes('youtu.be')) {
        let videoId = '';
        if(url.includes('youtu.be')) {
            videoId = url.split('youtu.be/')[1]?.split('?')[0];
        } else if(url.includes('watch?v=')) {
            videoId = url.split('watch?v=')[1]?.split('&')[0];
        }
        if(videoId) {
            embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        }
    } else if(url.includes('drive.google.com')) {
        let fileId = url.match(/[-\w]{25,}/);
        if(fileId) {
            embedUrl = `https://drive.google.com/file/d/${fileId[0]}/preview`;
        }
    } else if(url.includes('vimeo.com')) {
        let vimeoId = url.split('vimeo.com/')[1]?.split('?')[0];
        if(vimeoId) {
            embedUrl = `https://player.vimeo.com/video/${vimeoId}?autoplay=1`;
        }
    }
    
    iframe.src = embedUrl;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
    
    triggerSmartlink();
}

function closeStream() {
    const modal = document.getElementById('streamModal');
    const iframe = document.getElementById('streamIframe');
    if(modal) {
        modal.classList.remove('active');
        if(iframe) iframe.src = '';
        document.body.style.overflow = '';
    }
}

document.addEventListener('keydown', function(e) {
    if(e.key === 'Escape') {
        closeStream();
    }
});

function triggerSmartlink() {

function getSearchQuery() { return document.getElementById('searchInput')?.value.trim().replace(/\s+/g,' ') || ''; }
function cleanTitle(title) {
    if(!title) return '';
    let cleaned = title.replace(/@\S+/g, '');
    cleaned = cleaned.replace(/\s+/g, ' ').trim();
    return cleaned || title;
}
function formatSize(bytes) {
    if(!bytes || bytes === 0) return '';
    const k = 1024;
    const sizes = ['B','KB','MB','GB'];
    const i = Math.floor(Math.log(bytes)/Math.log(k));
    return parseFloat((bytes/Math.pow(k,i)).toFixed(2)) + ' ' + sizes[i];
}

function extractDownloadQualities(result) {
    let qualities = [];
    const qualityOrder = ["480p", "720p HEVC", "720p", "1080p"];
    if(result.qualities && typeof result.qualities === 'object') {
        for(let [q, data] of Object.entries(result.qualities)) {
            if(data && typeof data === 'object') {
                let msgId = data.message_id || result.real_message_id || result.message_id || result.id || '0';
                msgId = String(msgId).replace(/\D/g,'');
                if(msgId && msgId !== '0') {
                    let fileId = `${FILE_CHANNEL_ID}_${msgId}_${q.toLowerCase().replace(/\s+/g,'_')}`;
                    let size = data.file_size ? formatSize(data.file_size) : '';
                    qualities.push({ label: q, size: size, startParam: fileId });
                }
            }
        }
    }
    qualities.sort((a,b) => qualityOrder.indexOf(a.label) - qualityOrder.indexOf(b.label));
    if(qualities.length === 0 && result.has_file) {
        let defaultMsgId = (result.real_message_id || result.message_id || result.id || '0').toString().replace(/\D/g,'');
        if(defaultMsgId && defaultMsgId !== '0') {
            qualities = qualityOrder.map(label => ({
                label: label, size: '', startParam: `${FILE_CHANNEL_ID}_${defaultMsgId}_${label.toLowerCase().replace(/\s+/g,'_')}`
            }));
        }
    }
    return qualities;
}

function extractEpisodeLinks(content) {
    if(!content || content.trim() === '') return [];
    
    const episodes = [];
    const seenUrls = new Set();
    
    const patterns = [
        /(?:Episode|Ep|E)\s*(\d+)\s*[:.\-]?\s*(https?:\/\/[^\s<>\n]+)/gi,
        /\[(?:Episode|Ep|E)\s*(\d+)\]\s*(https?:\/\/[^\s<>\n]+)/gi,
        /【(\d+)】\s*(https?:\/\/[^\s<>\n]+)/gi,
        /E(\d{1,2})\s*[:.\-]?\s*(https?:\/\/[^\s<>\n]+)/gi,
        /Episode\s*(\d+)[^\n]*?(https?:\/\/[^\s<>\n]+)/gi,
        /(?:^|\n|\s)(\d+)[\s\-\.:]+(https?:\/\/[^\s<>\n]+)/gi
    ];
    
    for(let pattern of patterns) {
        let match;
        const contentCopy = content;
        pattern.lastIndex = 0;
        while((match = pattern.exec(contentCopy)) !== null) {
            let episodeNum = parseInt(match[1]);
            let url = match[2].trim();
            
            if(url && !seenUrls.has(url) && 
               !url.includes('t.me') && 
               !url.includes('telegram') &&
               !url.includes('clck.ru') &&
               !url.includes('broadcaster24.com') &&
               (url.startsWith('http://') || url.startsWith('https://'))) {
                
                seenUrls.add(url);
                episodes.push({ episode: episodeNum, url: url });
            }
        }
    }
    
    const uniqueEpisodes = [];
    const seenEpisodes = new Set();
    for(let ep of episodes) {
        if(!seenEpisodes.has(ep.episode)) {
            seenEpisodes.add(ep.episode);
            uniqueEpisodes.push(ep);
        }
    }
    
    uniqueEpisodes.sort((a,b) => a.episode - b.episode);
    return uniqueEpisodes;
}

// FIXED: Quality detection that handles Unicode and special characters
function extractQualityLinks(content) {
    if(!content || content.trim() === '') return [];
    
    console.log('=== PARSING CONTENT FOR QUALITIES ===');
    console.log('Content:', content);
    
    const qualities = [];
    const usedUrls = new Set();
    
    // Better regex to find URLs including those with $ and special chars
    const urlRegex = /https?:\/\/[^\s<>\n\[\]()"']+/gi;
    const allUrls = content.match(urlRegex) || [];
    
    console.log('Found URLs:', allUrls);
    
    // Quality mapping with patterns (case insensitive)
    const qualityMap = [
        { label: "1080p", patterns: [/1080p?/i, /𝟭𝟬𝟴𝟬𝗽/i, /full\s*hd/i, /fhd/i] },
        { label: "720p HEVC", patterns: [/720p\s*hevc/i, /720p\s*hev?c/i, /𝟳𝟮𝟬𝗽\s*𝗛𝗘𝗩𝗖/i, /hevc\s*720/i, /x265\s*720/i] },
        { label: "720p", patterns: [/720p?/i, /𝟳𝟮𝟬𝗽/i, /hd\s*ready/i] },
        { label: "480p", patterns: [/480p?/i, /𝟰𝟴𝟬𝗽/i, /sd/i] }
    ];
    
    // Method 1: Extract quality from the line before the URL
    const lines = content.split(/\r?\n/);
    
    for(let line of lines) {
        const lineLower = line.toLowerCase();
        const lineUrls = line.match(urlRegex) || [];
        
        if(lineUrls.length === 0) continue;
        
        // Check each quality pattern against the line
        for(let qm of qualityMap) {
            let matched = false;
            for(let pattern of qm.patterns) {
                if(pattern.test(lineLower)) {
                    matched = true;
                    break;
                }
            }
            
            if(matched) {
                for(let url of lineUrls) {
                    if(!usedUrls.has(url) && 
                       !url.includes('t.me') && 
                       !url.includes('telegram') &&
                       !url.includes('youtube.com') &&
                       !url.includes('youtu.be')) {
                        usedUrls.add(url);
                        qualities.push({ label: qm.label, url: url });
                        console.log(`✓ Found ${qm.label}: ${url}`);
                    }
                }
                break;
            }
        }
    }
    
    // Method 2: If no qualities found, check URL itself for quality indicators
    if(qualities.length === 0) {
        for(let url of allUrls) {
            const urlLower = url.toLowerCase();
            
            if(urlLower.includes('t.me') || urlLower.includes('telegram') || 
               urlLower.includes('youtube.com') || urlLower.includes('youtu.be')) {
                continue;
            }
            
            for(let qm of qualityMap) {
                let matched = false;
                for(let pattern of qm.patterns) {
                    if(pattern.test(urlLower)) {
                        matched = true;
                        break;
                    }
                }
                
                if(matched && !usedUrls.has(url)) {
                    usedUrls.add(url);
                    qualities.push({ label: qm.label, url: url });
                    console.log(`✓ Found ${qm.label} in URL: ${url}`);
                    break;
                }
            }
        }
    }
    
    // Remove duplicates by label (keep first of each quality)
    const uniqueQualities = [];
    const seenLabels = new Set();
    for(let q of qualities) {
        if(!seenLabels.has(q.label)) {
            seenLabels.add(q.label);
            uniqueQualities.push(q);
        }
    }
    
    // Sort in correct order
    const order = { "480p": 1, "720p HEVC": 2, "720p": 3, "1080p": 4 };
    uniqueQualities.sort((a,b) => (order[a.label] || 99) - (order[b.label] || 99));
    
    console.log('Final qualities:', uniqueQualities);
    console.log('===============================');
    
    return uniqueQualities;
}

function extractWatchContent(content) {
    if(!content || content.trim() === '') return { episodes: [], qualities: [] };
    
    const episodes = extractEpisodeLinks(content);
    const qualities = extractQualityLinks(content);
    
    return { episodes: episodes, qualities: qualities };
}

function extractDiskwalaQualities(content) {
    if(!content) return [];
    const urlRegex = /https?:\/\/[^\s<]+/gi;
    let allUrls = content.match(urlRegex) || [];
    const diskKeywords = ['disk', 'drive', 'mega', 'mediafire', 'gdrive', 'dropbox', '1fichier'];
    let diskLinks = [];
    for(let url of allUrls) {
        let lowerUrl = url.toLowerCase();
        if(lowerUrl.includes('t.me') || lowerUrl.includes('telegram') || lowerUrl.includes('clck.ru') || 
           lowerUrl.includes('tinyurl.com') || lowerUrl.includes('broadcaster24.com/join') || lowerUrl.includes('youtu.be')) continue;
        let isDisk = false;
        for(let kw of diskKeywords) if(lowerUrl.includes(kw)) { isDisk = true; break; }
        if(isDisk) diskLinks.push(url);
    }
    const qualityLabels = ["480p", "720p HEVC", "720p", "1080p"];
    let result = [];
    for(let i = 0; i < Math.min(diskLinks.length, qualityLabels.length); i++) {
        result.push({ label: qualityLabels[i], url: diskLinks[i] });
    }
    return result;
}

function hasTelegramLink(content) { return content && content.toLowerCase().includes('t.me/sk4film'); }
function hasBackupLink(content) { return content && content.toLowerCase().includes('broadcaster24.com/join'); }
function hasHowToLink(content) { return content && content.toLowerCase().includes('youtu.be/fvl7dfhnwwm'); }

function handleDownload(startParam) {
    triggerSmartlink();
    let link = `https://t.me/${BOT_USERNAME}?start=${startParam}`;
    if(hasUserSeenRedirect) { window.open(link, '_blank'); return; }
    localStorage.setItem(REDIRECT_KEY, 'true');
    hasUserSeenRedirect = true;
    window.open(link, '_blank');
}

function handleWatchOnline(url, title) {
    triggerSmartlink();
    if(url) {
        openStream(url, title);
    }
}

function joinTelegram() { triggerSmartlink(); window.open('https://t.me/sk4film', '_blank'); }
function joinBackup() { triggerSmartlink(); window.open('https://broadcaster24.com/join/CCM33FHM', '_blank'); }
function howToWatch() { window.open('https://youtu.be/fVL7DfhnwWM', '_blank'); }

let currentOpenDropdown = null;
function toggleDropdown(dropdownId, event) {
    if(event) event.stopPropagation();
    const dropdown = document.getElementById(dropdownId);
    if(!dropdown) return;
    if(currentOpenDropdown === dropdownId) {
        dropdown.style.display = 'none';
        currentOpenDropdown = null;
    } else {
        if(currentOpenDropdown) {
            const prev = document.getElementById(currentOpenDropdown);
            if(prev) prev.style.display = 'none';
        }
        dropdown.style.display = 'block';
        currentOpenDropdown = dropdownId;
    }
}

function renderResultCard(result, idx) {
    let rawTitle = result.title || 'Untitled';
    let cleanMovieTitle = cleanTitle(rawTitle);
    let thumb = result.thumbnail_url || result.poster_url || FALLBACK_THUMB;
    let hasFile = result.has_file === true;
    let rawPost = result.post_content || result.content || '';
    let hasPost = rawPost && rawPost.trim().length > 0;
    
    let downloadQualities = extractDownloadQualities(result);
    let watchContent = hasPost ? extractWatchContent(rawPost) : { episodes: [], qualities: [] };
    let diskQualities = hasPost ? extractDiskwalaQualities(rawPost) : [];
    
    let hasDownload = hasFile && downloadQualities.length > 0;
    let hasDisk = hasPost && diskQualities.length > 0;
    let hasEpisodes = watchContent.episodes && watchContent.episodes.length > 0;
    let hasQualities = watchContent.qualities && watchContent.qualities.length > 0;
    let hasWatch = hasEpisodes || hasQualities;
    
    let showTelegram = hasTelegramLink(rawPost);
    let showBackup = hasBackupLink(rawPost);
    let showHowTo = hasHowToLink(rawPost);
    
    let downloadDropdownId = `download-dd-${idx}`;
    let watchDropdownId = `watch-dd-${idx}`;
    let diskDropdownId = `disk-dd-${idx}`;
    
    let html = `<div class="result-card" data-idx="${idx}">`;
    html += `<div class="poster-container" onclick="triggerSmartlink()">
                <img class="poster-img" src="${thumb}" alt="${escapeHtml(cleanMovieTitle)}" onerror="this.src='${FALLBACK_THUMB}'">
                <div class="play-overlay">
                    <div class="play-button-center"><i class="fas fa-play"></i></div>
                </div>
             </div>`;
    html += `<h3 class="result-title">🎬 ${escapeHtml(cleanMovieTitle)}</h3>`;
    
    html += `<div class="buttons-container">`;
    
    if(hasDownload) {
        html += `<div class="button-item">
                    <button class="btn-main btn-download" onclick="toggleDropdown('${downloadDropdownId}', event)">
                        <i class="fas fa-download"></i> 📥 Download Now
                    </button>
                    <div id="${downloadDropdownId}" class="dropdown-container" style="display:none;">
                        <div class="quality-grid">`;
        for(let q of downloadQualities) {
            let sizeText = q.size ? `<span style="font-size:10px; display:block;">${q.size}</span>` : '';
            html += `<div class="quality-item" data-quality="${q.label}" onclick="handleDownload('${escapeHtml(q.startParam)}')">${q.label} ${sizeText}</div>`;
        }
        html += `</div></div></div>`;
    }
    
    if(hasWatch) {
        html += `<div class="button-item">
                    <button class="btn-main btn-watch" onclick="toggleDropdown('${watchDropdownId}', event)">
                        <i class="fas fa-play-circle"></i> ▶️ Watch Online
                    </button>
                    <div id="${watchDropdownId}" class="dropdown-container" style="display:none;">`;
        
        if(hasEpisodes) {
            html += `<div class="episode-header">
                        <i class="fas fa-tv"></i> Select Episode
                     </div>
                     <div class="episode-grid">`;
            for(let ep of watchContent.episodes) {
                let epMod = ((ep.episode - 1) % 12) + 1;
                html += `<div class="episode-item" data-ep="${epMod}" onclick="handleWatchOnline('${escapeHtml(ep.url)}', '${escapeHtml(cleanMovieTitle)} - Episode ${ep.episode}')">
                            📺 Episode ${ep.episode}
                         </div>`;
            }
            html += `</div>`;
        }
        
        if(hasQualities) {
            if(hasEpisodes) {
                html += `<div style="margin-top: 15px;"></div>`;
            }
            html += `<div class="quality-header">
                        <i class="fas fa-video"></i> Select Quality
                     </div>
                     <div class="quality-grid">`;
            for(let q of watchContent.qualities) {
                html += `<div class="quality-item" data-quality="${q.label}" onclick="handleWatchOnline('${escapeHtml(q.url)}', '${escapeHtml(cleanMovieTitle)} - ${q.label}')">${q.label}</div>`;
            }
            html += `</div>`;
        }
        
        html += `</div></div>`;
    }
    
    if(hasDisk) {
        html += `<div class="button-item">
                    <button class="btn-main btn-disk" onclick="toggleDropdown('${diskDropdownId}', event)">
                        <i class="fas fa-hdd"></i> 💿 Diskwala Link
                    </button>
                    <div id="${diskDropdownId}" class="dropdown-container" style="display:none;">
                        <div class="quality-grid">`;
        for(let d of diskQualities) {
            html += `<div class="quality-item" data-quality="${d.label}" onclick="window.open('${escapeHtml(d.url)}', '_blank')">${d.label}</div>`;
        }
        html += `</div></div></div>`;
    }
    
    html += `</div>`;
    
    if(showTelegram || showBackup || showHowTo) {
        html += `<div class="action-row">`;
        if(showTelegram) html += `<button class="btn-action" onclick="joinTelegram()"><i class="fab fa-telegram"></i> Join Official</button>`;
        if(showBackup) html += `<button class="btn-action" onclick="joinBackup()"><i class="fas fa-link"></i> Join Backup</button>`;
        if(showHowTo) html += `<button class="btn-action" onclick="howToWatch()"><i class="fab fa-youtube"></i> How to Watch</button>`;
        html += `</div>`;
    }
    
    html += `</div>`;
    return html;
}

function escapeHtml(str) { 
    if(!str) return ''; 
    return str.replace(/[&<>]/g, function(m){
        if(m==='&') return '&amp;';
        if(m==='<') return '&lt;';
        if(m==='>') return '&gt;';
        return m;
    });
}

async function performSearch(page=1) {
    let query = getSearchQuery();
    if(!query) {
        document.getElementById('resultsContainer').innerHTML = '<div class="error-state"><i class="fas fa-search fa-3x"></i><h4>Enter a movie or series name</h4></div>';
        return;
    }
    currentQuery = query; currentPage = page;
    window.history.pushState({}, '', `?query=${encodeURIComponent(query)}&page=${page}`);
    showLoader();
    const container = document.getElementById('resultsContainer');
    const infoDiv = document.getElementById('resultsInfo');
    const pagiDiv = document.getElementById('paginationContainer');
    if(container) container.innerHTML = '';
    if(infoDiv) infoDiv.innerHTML = '';
    if(pagiDiv) pagiDiv.innerHTML = '';
    
    const cacheKey = `${query}-${page}`;
    if(searchCache.has(cacheKey)) {
        setTimeout(() => {
            let cached = searchCache.get(cacheKey);
            renderResults(cached.results, cached.pagination);
            hideLoader();
        }, 500);
        return;
    }
    
    let data = await fetchAPI(query, page);
    setTimeout(() => {
        if(data && data.results && data.results.length > 0) {
            searchCache.set(cacheKey, { results: data.results, pagination: data.pagination });
            renderResults(data.results, data.pagination);
        } else if(data && data.results && data.results.length === 0) {
            container.innerHTML = '<div class="error-state">No results found</div>';
        } else {
            container.innerHTML = `<div class="error-state"><button onclick="performSearch(${page})" style="background:#00ccff; border:none; padding:10px 25px; border-radius:30px;">Retry</button></div>`;
        }
        hideLoader();
    }, 1200);
}

async function fetchAPI(query, page) {
    for(let ep of API_ENDPOINTS) {
        try {
            let url = `${ep}/api/search?query=${encodeURIComponent(query)}&page=${page}&limit=${RESULTS_PER_PAGE}`;
            let controller = new AbortController();
            let timeout = setTimeout(()=>controller.abort(), 10000);
            let res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeout);
            if(res.ok) {
                let json = await res.json();
                if(json.status === 'success') return json;
            }
        } catch(e) {}
    }
    return null;
}

function renderResults(results, pagination) {
    const container = document.getElementById('resultsContainer');
    const infoDiv = document.getElementById('resultsInfo');
    const pagiDiv = document.getElementById('paginationContainer');
    if(!container) return;
    if(results.length === 0) { container.innerHTML = '<div class="error-state">No movies found</div>'; return; }
    if(infoDiv) infoDiv.innerHTML = `<strong>${pagination.total_results}</strong> results · Page ${pagination.current_page} of ${pagination.total_pages}`;
    
    let html = '';
    results.forEach((res, idx) => {
        html += renderResultCard(res, idx);
    });
    container.innerHTML = html;
    
    if(pagination.total_pages > 1) {
        let pagesHtml = '<div class="pagination">';
        if(pagination.has_previous) pagesHtml += `<a class="page-link" onclick="changePage(${pagination.current_page-1})">« Prev</a>`;
        for(let i=1; i<=pagination.total_pages; i++) {
            if(i===1 || i===pagination.total_pages || (i>=pagination.current_page-2 && i<=pagination.current_page+2))
                pagesHtml += `<a class="page-link ${i===pagination.current_page ? 'active' : ''}" onclick="changePage(${i})">${i}</a>`;
        }
        if(pagination.has_next) pagesHtml += `<a class="page-link" onclick="changePage(${pagination.current_page+1})">Next »</a>`;
        pagesHtml += '</div>';
        pagiDiv.innerHTML = pagesHtml;
    } else pagiDiv.innerHTML = '';
}

function changePage(p) { if(p>0) performSearch(p); }

document.getElementById('searchButton')?.addEventListener('click', ()=>performSearch(1));
document.getElementById('searchInput')?.addEventListener('keypress', e=>{if(e.key==='Enter') performSearch(1);});
function toggleMenu() {
    let d = document.getElementById('menuDropdown');
    d.style.display = d.style.display === 'none' ? 'block' : 'none';
}

window.addEventListener('load', ()=>{
    let params = new URLSearchParams(location.search);
    let q = params.get('query');
    let pg = parseInt(params.get('page')) || 1;
    if(q && document.getElementById('searchInput')) {
        document.getElementById('searchInput').value = q;
        performSearch(pg);
    }
});
