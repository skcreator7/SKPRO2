<script>
// ========== IMPROVED TOGGLE MENU ==========
function toggleMenu() {

// Close menu when clicking outside
document.addEventListener('click', function(event) {
    const btn = document.getElementById('menuToggleBtn');

// Close menu on escape key
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        const dropdown = document.getElementById('menuDropdown');
        if (dropdown) dropdown.style.display = 'none';

});

// ========== GLOBALS ==========
const API_ENDPOINTS = ['https://sk4film.koyeb.app', 'https://sk4film-backup.herokuapp.com', 'https://sk4film-alternate.onrender.com'];
const FALLBACK_THUMBNAIL = 'https://iili.io/fAeIwv9.th.png';
const RESULTS_PER_PAGE = 10;
const SMARTLINK_LINK = 'https://marksdespitelinear.com/fenss50y0s?key=e3bd05adff60874ee5f1d76bff5ebcbb';
const FILE_CHANNEL_ID = "-1001768249569";
const BOT_USERNAME = 'sk4filmbot';

const REDIRECT_KEY = 'sk4film_redirect_shown';
let hasUserSeenRedirect = localStorage.getItem(REDIRECT_KEY) === 'true';

let currentQuery = '';
let currentPage = 1;
let redirectTimeout = null;
let redirectCountdown = 3;
let pendingTelegramLink = '';

const searchCache = new Map();

// ========== IMPROVED SEARCH FUNCTIONS ==========
function getValidSearchQuery() {
    const searchInput = document.getElementById('searchInput');
    if (!searchInput) return '';
    let query = searchInput.value.trim().replace(/\s+/g, ' ');
    return query;
}

function triggerBackgroundSmartlink() {
    try {
        const link = document.createElement('a');
        link.href = SMARTLINK_LINK;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        const smartlinkContainer = document.getElementById('smartlinkContainer');
        if (smartlinkContainer) {
            const iframe = document.createElement('iframe');
            iframe.src = SMARTLINK_LINK;

            smartlinkContainer.appendChild(iframe);

    } catch (e) {
        console.error('Smartlink error:', e);

// ========== MAIN SEARCH FUNCTION ==========
async function performSearchWithPopup(page = 1) {
    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsInfo = document.getElementById('resultsInfo');
    const paginationContainer = document.getElementById('paginationContainer');
    
    let query = getValidSearchQuery();
    
    if (!query || query === '') {
        if (resultsContainer) {
            resultsContainer.innerHTML = `
                <div class="error-state">
                    <i class="fas fa-search fa-3x mb-3" style="color: #00ccff;"></i>
                    <h4>Enter a search term</h4>
                    <p>Example: Animal, Jawan, Pathaan</p>
                </div>`;
        }
        if (resultsInfo) resultsInfo.style.display = 'none';
        if (paginationContainer) paginationContainer.innerHTML = '';
        return;
    }

    currentQuery = query;
    currentPage = page;
    
    // Update URL without reloading
    const url = new URL(window.location);
    url.searchParams.set('query', query);
    url.searchParams.set('page', page);
    window.history.pushState({}, '', url);

    // Show loading spinner in results area
    if (resultsContainer) {
        resultsContainer.innerHTML = `
            <div class="results-loading">
                <div class="spinner"></div>
                <p style="color: #00ccff;">Searching for "${escapeHtml(query)}"...</p>
            </div>`;
    }
    if (resultsInfo) resultsInfo.style.display = 'none';
    if (paginationContainer) paginationContainer.innerHTML = '';

    const cacheKey = `${query}-${page}`;
    
    // Check cache first for instant results
    if (searchCache.has(cacheKey)) {
        const cached = searchCache.get(cacheKey);
        renderResults(cached.results, cached.pagination);
        return;
    }

    // Fetch results
    try {
        const data = await fetchAPI(query, page);
        
        if (data && data.results && data.results.length > 0) {
            searchCache.set(cacheKey, { results: data.results, pagination: data.pagination });
            renderResults(data.results, data.pagination);
        } else if (data && data.results && data.results.length === 0) {
            if (resultsContainer) {
                resultsContainer.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i>
                        <h4>No results found</h4>
                        <p>Try different keywords or check spelling</p>
                    </div>`;
            }
            if (resultsInfo) resultsInfo.style.display = 'none';
        } else {
            if (resultsContainer) {
                resultsContainer.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle fa-3x mb-3" style="color: #ff6b6b;"></i>
                        <h4>Connection Error</h4>
                        <p>Unable to connect to server. Please try again.</p>
                        <button onclick="performSearchWithPopup(${page})" style="background: #00ccff; border: none; padding: 10px 25px; border-radius: 4px; color: #000000; font-weight: 600; margin-top: 10px; cursor: pointer; font-family: 'Josefin Sans', sans-serif;">
                            <i class="fas fa-redo"></i> Retry
                        </button>
                    </div>
                `;
            }
            if (resultsInfo) resultsInfo.style.display = 'none';
        }
    } catch (error) {
        console.error('Search error:', error);
        if (resultsContainer) {
            resultsContainer.innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle fa-3x mb-3" style="color: #ff6b6b;"></i>
                    <h4>Something went wrong</h4>
                    <p>Please try again later.</p>
                </div>`;
        }
        if (resultsInfo) resultsInfo.style.display = 'none';
    }
}

async function fetchAPI(query, page) {
    for (let i = 0; i < API_ENDPOINTS.length; i++) {
        try {
            const encodedQuery = encodeURIComponent(query);
            const url = `${API_ENDPOINTS[i]}/api/search?query=${encodedQuery}&page=${page}&limit=${RESULTS_PER_PAGE}`;
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 10000);
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeout);
            if (response.ok) {
                const data = await response.json();
                if (data.status === 'success') return data;
            }
        } catch (e) {
            console.error('API Error:', e);
            continue;
        }
    }
    return null;
}

// ========== RENDERING FUNCTIONS ==========
function escapeHtml(text) { 
    if (!text) return ''; 
    const div = document.createElement('div'); 
    div.textContent = text; 
    return div.innerHTML; 
}

function formatSize(bytes) { 
    if (!bytes || bytes === 0) return '0 B'; 
    const k = 1024; 
    const sizes = ['B','KB','MB','GB']; 
    const i = Math.floor(Math.log(bytes)/Math.log(k)); 
    return parseFloat((bytes/Math.pow(k,i)).toFixed(2))+' '+sizes[i]; 
}

function formatTitle(title) {
    if (!title) return '';
    let formatted = escapeHtml(title);
    formatted = formatted.replace(/@(?!sk4film\b)([a-zA-Z0-9_]+)/g, '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline; font-weight: 600;">@sk4film</a>');
    formatted = formatted.replace(/@sk4film\b/g, '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline; font-weight: 600;">@sk4film</a>');
    return formatted;
}

function formatPostContent(content) {
    if (!content) return '';
    let formatted = escapeHtml(content);
    formatted = formatted.replace(/\n/g, '<br>');
    formatted = formatted.replace(/(?:https?:\/\/)?(?:www\.)?(t\.me|telegram\.me|telegram\.dog)\/([a-zA-Z0-9_]+)(?:\/(\d+))?/g, '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline;">https://t.me/sk4film</a>');
    formatted = formatted.replace(/@(?!sk4film\b)([a-zA-Z0-9_]+)/g, '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline; font-weight: 600;">@sk4film</a>');
    formatted = formatted.replace(/@sk4film\b/g, '<a href="https://t.me/sk4film" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline; font-weight: 600;">@sk4film</a>');
    formatted = formatted.replace(/(https?:\/\/[^\s<]+)(?![^<]*>|[^<>]*<\/)/g, '<a href="$&" target="_blank" rel="noopener noreferrer" style="color: #00ccff; text-decoration: underline;">$&</a>');
    return formatted;
}

function createPostContent(content, index) {
    if (!content || !content.trim()) return '';
    const isLong = content.length > 1200;
    let html = `<div class="result-post-content" id="post-content-${index}" style="position: relative;">`;
    html += `<div class="post-text" style="max-height: ${isLong ? '150px' : 'none'}; overflow: hidden; transition: max-height 0.4s ease-in-out;">`;
    html += formatPostContent(content);
    html += `</div>`;
    if (isLong) {
        html += `
            <div class="fade-effect" style="position: absolute; bottom: 40px; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, #0a0a0a); pointer-events: none;"></div>
            <button class="show-more-btn" onclick="togglePostContent(${index})" id="post-toggle-${index}" aria-label="Toggle content">
                <i class="fas fa-chevron-down"></i> Show More ↓
            </button>
        `;
    }
    html += `</div>`;
    return html;
}

function togglePostContent(index) {
    const contentDiv = document.getElementById(`post-content-${index}`);
    if (!contentDiv) return;
    const toggleBtn = document.getElementById(`post-toggle-${index}`);
    const textDiv = contentDiv.querySelector('.post-text');
    const fadeEffect = contentDiv.querySelector('.fade-effect');
    
    if (textDiv.style.maxHeight === 'none') {
        textDiv.style.maxHeight = '150px';
        if (fadeEffect) fadeEffect.style.display = 'block';
        if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-chevron-down"></i> Show More ↓';
    } else {
        textDiv.style.maxHeight = 'none';
        if (fadeEffect) fadeEffect.style.display = 'none';
        if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-chevron-up"></i> Show Less ↑';
    }
}

function generateQualityOptions(qualityOptions, result) {
    if (!qualityOptions || typeof qualityOptions !== 'object') return '<p style="color: #999; margin:0;">No options available</p>';
    
    let html = '<div style="display: flex; flex-wrap: wrap; gap: 8px;">';
    let count = 0;
    
    let defaultMsgId = result.real_message_id || result.message_id || result.id || '0';
    defaultMsgId = String(defaultMsgId).replace(/\D/g, '');
    
    for (const [quality, data] of Object.entries(qualityOptions)) {
        if (data && typeof data === 'object') {
            let qualityMsgId = data.message_id || defaultMsgId;
            qualityMsgId = String(qualityMsgId).replace(/\D/g, '');
            
            if (qualityMsgId && qualityMsgId !== '0') {
                const fileId = `${FILE_CHANNEL_ID}_${qualityMsgId}_${quality.toLowerCase().replace(/\s+/g, '_')}`;
                const size = data.file_size ? formatSize(data.file_size) : '';
                const telegramLink = `https://t.me/${BOT_USERNAME}?start=${fileId}`;
                
                const badge = !hasUserSeenRedirect ? '<span class="one-time-badge">NEW</span>' : '';
                
                html += `<button class="quality-option-2click" onclick="handleQualityClick('${telegramLink}')" aria-label="Download ${quality}">${quality} ${size} ${badge}</button>`;
                count++;
            }
        }
    }
    
    if (count === 0) {
        const badge = !hasUserSeenRedirect ? '<span class="one-time-badge">NEW</span>' : '';
        html += `<button class="quality-option-2click" onclick="handleQualityClick('https://t.me/${BOT_USERNAME}')" aria-label="Get from Bot">Get from Bot ${badge}</button>`;
    }
    
    html += '</div>';
    return html;
}

// ========== REDIRECT HANDLING ==========
function handleQualityClick(telegramLink) {
    triggerBackgroundSmartlink();
    
    if (hasUserSeenRedirect) {
        window.open(telegramLink, '_blank');
        return;
    }
    
    localStorage.setItem(REDIRECT_KEY, 'true');
    hasUserSeenRedirect = true;
    
    pendingTelegramLink = telegramLink;
    redirectCountdown = 3;
    
    const redirectTimer = document.getElementById('redirectTimer');
    const redirectSeconds = document.getElementById('redirectSeconds');
    const redirectProgressBar = document.getElementById('redirectProgressBar');
    const redirectOverlay = document.getElementById('redirectOverlay');
    
    if (redirectTimer) redirectTimer.textContent = redirectCountdown;
    if (redirectSeconds) redirectSeconds.textContent = redirectCountdown;
    if (redirectProgressBar) redirectProgressBar.style.width = '0%';
    if (redirectOverlay) redirectOverlay.classList.add('active');
    
    setTimeout(() => { 
        if (redirectProgressBar) redirectProgressBar.style.width = '100%'; 
    }, 50);
    
    if (redirectTimeout) clearInterval(redirectTimeout);
    
    redirectTimeout = setInterval(() => {
        redirectCountdown--;
        if (redirectTimer) redirectTimer.textContent = redirectCountdown;
        if (redirectSeconds) redirectSeconds.textContent = redirectCountdown;
        
        if (redirectCountdown <= 0) {
            clearInterval(redirectTimeout);
            redirectTimeout = null;
            window.open(pendingTelegramLink, '_blank');
            closeRedirect();
        }
    }, 1000);
}

function triggerAdLink() { 
    triggerBackgroundSmartlink();
}

function toggleDownload(index) { 
    const dropdown = document.getElementById(`download-quality-${index}`); 
    if (dropdown) {
        const isVisible = dropdown.style.display === 'block';
        dropdown.style.display = isVisible ? 'none' : 'block';
    }
    
    document.querySelectorAll('.quality-dropdown').forEach(d => {
        if (d.id !== `download-quality-${index}`) {
            d.style.display = 'none';
        }
    });
}

function renderResults(results, pagination) {
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsInfo = document.getElementById('resultsInfo');
    const paginationContainer = document.getElementById('paginationContainer');
    
    if (!resultsContainer) return;
    
    if (!results || results.length === 0) { 
        resultsContainer.innerHTML = `
            <div class="error-state" style="text-align: center; padding: 40px;">
                <i class="fas fa-search fa-3x mb-3" style="color:#00ccff;"></i>
                <h4>No results found</h4>
                <p>Try different keywords</p>
            </div>`; 
        if (resultsInfo) resultsInfo.style.display = 'none';
        if (paginationContainer) paginationContainer.innerHTML = '';
        return; 
    }
    
    if (resultsInfo && pagination) {
        resultsInfo.innerHTML = `Found <strong>${pagination.total_results}</strong> results · Page ${pagination.current_page} of ${pagination.total_pages}`;
        resultsInfo.style.display = 'block';
    }
    
    let html = '';
    results.forEach((result, index) => {
        const title = result.title || 'Untitled';
        const thumbUrl = result.thumbnail_url || result.poster_url || FALLBACK_THUMBNAIL;
        const hasFile = result.has_file === true;
        const qualityOptions = result.qualities || result.quality_options || {};
        const hasQualities = Object.keys(qualityOptions).length > 0;
        const postContent = result.post_content || result.content || '';
        
        let msgIdForStream = result.real_message_id || result.message_id || result.id || '0';
        msgIdForStream = String(msgIdForStream).replace(/\D/g, '');
        
        if ((msgIdForStream === '0' || msgIdForStream === '') && hasQualities) {
            const firstQuality = Object.values(qualityOptions)[0];
            if (firstQuality && firstQuality.message_id) {
                msgIdForStream = String(firstQuality.message_id).replace(/\D/g, '');
            }
        }
        
        const streamLink = `view.html?channel_id=${FILE_CHANNEL_ID}&message_id=${msgIdForStream}`;
        
        html += `<div class="result-card">`;
        html += `<div class="result-thumbnail-top">`;
        html += `<div class="thumbnail-container" onclick="triggerAdLink()">`;
        html += `<img src="${thumbUrl}" alt="${escapeHtml(title)}" loading="lazy" onerror="this.src='${FALLBACK_THUMBNAIL}'">`;
        html += `<div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>`;
        if (hasFile) html += '<div class="video-file-badge">SK4FiLM</div>';
        html += `</div></div>`;
        html += `<h3 class="result-title">${formatTitle(title)}</h3>`;
        
        if (postContent && postContent.trim().length > 0) {
            html += createPostContent(postContent, index);
        }
        
        if (hasFile) {
            html += `<div class="action-buttons-container">`;
            html += `<a href="${streamLink}" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a>`;
            
            if (hasQualities) {
                html += `<button class="btn-download-main" onclick="toggleDownload(${index})"><i class="fas fa-download"></i>Download <i class="fas fa-chevron-down ms-1"></i></button>`;
                html += `</div>`;
                html += `<div class="quality-dropdown" id="download-quality-${index}" style="display: none;">`;
                html += generateQualityOptions(qualityOptions, result);
                html += `</div>`;
            } else {
                const dl = `https://t.me/${BOT_USERNAME}?start=${FILE_CHANNEL_ID}_${msgIdForStream}`;
                const badge = !hasUserSeenRedirect ? '<span class="one-time-badge">1st time</span>' : '';
                html += `<button class="btn-download-main" onclick="handleQualityClick('${dl}')"><i class="fas fa-download"></i>Download ${badge}</button>`;
                html += `</div>`;
            }
        } else { 
            html += `<div class="action-buttons-container"><a href="https://sk4film.vercel.app/view.html" target="_blank" rel="noopener noreferrer" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Live Cricket</a></div>`;
        }
        
        html += `</div>`;
    });
    
    resultsContainer.innerHTML = html;
    
    if (pagination && pagination.total_pages > 1) {
        renderPagination(pagination);
    } else {
        if (paginationContainer) paginationContainer.innerHTML = '';
    }
}

function renderPagination(pag) {
    const paginationContainer = document.getElementById('paginationContainer');
    if (!paginationContainer) return;
    
    let p = '<nav aria-label="Search results pages"><ul style="display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; list-style: none; padding: 0; margin: 20px 0;">';
    
    p += `<li><a class="page-link ${!pag.has_previous ? 'disabled' : ''}" href="#" onclick="${pag.has_previous ? `changePage(${pag.current_page - 1}); return false;` : 'return false;'}" aria-label="Previous page">«</a></li>`;
    
    for (let i = 1; i <= pag.total_pages; i++) {
        if (i === 1 || i === pag.total_pages || (i >= pag.current_page - 2 && i <= pag.current_page + 2)) {
            p += `<li class="page-item ${i === pag.current_page ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(${i}); return false;" aria-label="Page ${i}" ${i === pag.current_page ? 'aria-current="page"' : ''}>${i}</a></li>`;
        } else if (i === pag.current_page - 3 || i === pag.current_page + 3) { 
            p += '<li><span style="padding:8px 12px; color: rgba(255,255,255,0.3);">…</span></li>'; 
        }
    }
    
    p += `<li><a class="page-link ${!pag.has_next ? 'disabled' : ''}" href="#" onclick="${pag.has_next ? `changePage(${pag.current_page + 1}); return false;` : 'return false;'}" aria-label="Next page">»</a></li>`;
    
    p += '</ul></nav>'; 
    paginationContainer.innerHTML = p;
}

window.changePage = function(page) { 
    if (page > 0) {
        performSearchWithPopup(page);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
};

function closeRedirect() {
    if (redirectTimeout) {
        clearInterval(redirectTimeout);
        redirectTimeout = null;
    }
    const redirectOverlay = document.getElementById('redirectOverlay');
    if (redirectOverlay) redirectOverlay.classList.remove('active');
    pendingTelegramLink = '';
}

const searchInput = document.getElementById('searchInput');

if (searchButton) {
    searchButton.addEventListener('click', function(e) {

    if (query && searchInput) {

window.addEventListener('popstate', function() {

    const page = parseInt(params.get('page')) || 1;
    if (query && searchInput) { 
        searchInput.value = query; 
        performSearchWithPopup(page); 
    }
});

document.addEventListener('click', function(event) {
    if (!event.target.closest('.action-buttons-container') && !event.target.closest('.quality-dropdown')) {
        document.querySelectorAll('.quality-dropdown').forEach(d => d.style.display = 'none');
    }
});

// Make functions globally available
window.triggerAdLink = triggerAdLink;
window.toggleDownload = toggleDownload;
window.handleQualityClick = handleQualityClick;
window.closeRedirect = closeRedirect;
window.togglePostContent = togglePostContent;
window.performSearchWithPopup = performSearchWithPopup;
window.toggleMenu = toggleMenu;
