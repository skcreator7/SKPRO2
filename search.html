<script>
function toggleMenu(){const d=document.getElementById('menuDropdown');if(d)d.style.display=d.style.display==='block'?'none':'block';}
document.addEventListener('click',e=>{const b=document.getElementById('menuToggleBtn'),d=document.getElementById('menuDropdown');if(b&&d&&!b.contains(e.target)&&!d.contains(e.target))d.style.display='none';});

const API=['https://sk4film.koyeb.app','https://sk4film-backup.herokuapp.com','https://sk4film-alternate.onrender.com'];
const FTHUMB='https://iili.io/fAeIwv9.th.png',RPP=10;
const SML='https://marksdespitelinear.com/fenss50y0s?key=e3bd05adff60874ee5f1d76bff5ebcbb';
const CHID="-1001768249569",BOT='sk4filmbot',RKEY='sk4film_redirect_shown';
let seen=localStorage.getItem(RKEY)==='true';
let cq='',cp=1,rt=null,rc=3,pl='';
const cache=new Map();

function gq(){const s=document.getElementById('searchInput');return s?s.value.trim():'';}
function tsl(){try{const a=document.createElement('a');a.href=SML;a.target='_blank';a.rel='noopener noreferrer';a.click();}catch(e){}}
function tal(){tsl();}
function eh(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function fs(b){if(!b||b===0)return'';const k=1024,s=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];}
function gc(n){const m={1:'ep-chip-01',2:'ep-chip-02',3:'ep-chip-03',4:'ep-chip-04',5:'ep-chip-05',6:'ep-chip-06',7:'ep-chip-07',8:'ep-chip-08',9:'ep-chip-09',10:'ep-chip-10',11:'ep-chip-11',12:'ep-chip-12'};return m[parseInt(n)]||'ep-chip-01';}

// ====== CRITICAL: getMsgId - NOW WORKS DIRECTLY ON OBJECT ======
function getMsgId(obj){
    if(!obj)return'0';
    // Direct property access - no copying
    if(obj.real_message_id){let v=String(obj.real_message_id).replace(/\D/g,'');if(v&&v!=='0')return v;}
    if(obj.message_id){let v=String(obj.message_id).replace(/\D/g,'');if(v&&v!=='0')return v;}
    if(obj.id){let v=String(obj.id).replace(/\D/g,'');if(v&&v!=='0')return v;}
    if(obj.file_id){let v=String(obj.file_id).replace(/\D/g,'');if(v&&v!=='0')return v;}
    // Search any field with 'id' in name
    for(const k in obj){
        if(k.toLowerCase().includes('id')||k.toLowerCase().includes('msg')){
            let v=String(obj[k]).replace(/\D/g,'');
            if(v&&v!=='0'&&v.length>2)return v;
        }
    }
    return'0';
}

// ====== RADICAL FIX: NO COPYING - USE ORIGINAL OBJECT DIRECTLY ======
function groupEpisodesBySeries(results){
    const grouped=[],sm=new Map(),sa=[];
    console.log('🔍 TOTAL RESULTS:',results.length);
    
    results.forEach((r,idx)=>{
        const t=r.title||'';
        
        // Log EVERYTHING about first 3 results
        if(idx<3){
            console.log('📄 RESULT['+idx+']:');
            console.log('  title:',t);
            console.log('  typeof r:',typeof r);
            console.log('  r.real_message_id:',r.real_message_id,' (type:',typeof r.real_message_id,')');
            console.log('  r.message_id:',r.message_id,' (type:',typeof r.message_id,')');
            console.log('  r.id:',r.id,' (type:',typeof r.id,')');
            console.log('  r.has_file:',r.has_file);
            console.log('  getMsgId(r):',getMsgId(r));
            console.log('  ALL keys:',Object.keys(r));
            // Check if real_message_id is a getter
            const desc=Object.getOwnPropertyDescriptor(r,'real_message_id');
            console.log('  descriptor:',desc);
        }
        
        let m=null,en='',sn='';
        m=t.match(/^(.*?)\s*[\(\[]?\s*E(?:p(?:isode)?)?[\.\s\-]*(\d+)/i);
        if(m){sn=m[1].trim();en=m[2];}
        if(!m){m=t.match(/^(.*?)\s*S(?:eason)?[\.\s\-]*\d+\s*E(?:p(?:isode)?)?[\.\s\-]*(\d+)/i);if(m){sn=m[1].trim();en=m[2];}}
        if(!m){m=t.match(/^(.*?)\s*[\(\[]?\s*Part[\.\s\-]*(\d+)/i);if(m){sn=m[1].trim();en=m[2];}}
        if(!m){m=t.match(/^(.*?)\s*[\(\[]?\s*(\d{2,3})\s*[\)\]]?\s*$/);if(m&&parseInt(m[2])>=1&&parseInt(m[2])<=99){sn=m[1].trim();en=m[2];}}
        
        if(m&&sn&&en){
            sn=sn.replace(/[\(\[]\s*(?:Season|S)\s*\d+\s*[\)\]]/gi,'').trim().replace(/\s+-\s*$/g,'').trim().replace(/\s*\(\d{4}\)\s*/g,' ').trim().replace(/\s+/g,' ').trim();
            if(sn.length<2){sa.push(r);return;}
            const key=sn.toLowerCase();
            if(!sm.has(key))sm.set(key,{seriesName:sn,episodes:[],thumbnail:r.thumbnail_url||r.poster_url||FTHUMB,post_content:r.post_content||r.content||'',has_file:false});
            const s=sm.get(key);
            
            // ====== USE ORIGINAL OBJECT - NO COPY ======
            r.episodeNumber=en;
            const mid=getMsgId(r);
            console.log('📦 EP'+en+' direct msgId:',mid,' real_message_id:',r.real_message_id);
            
            const dup=s.episodes.some(ep=>{
                const em=getMsgId(ep);
                return ep.episodeNumber===en||(mid!=='0'&&em!=='0'&&mid===em);
            });
            
            if(!dup){
                s.episodes.push(r); // PUSH ORIGINAL OBJECT
                if(r.has_file===true)s.has_file=true;
                if(r.thumbnail_url)s.thumbnail=r.thumbnail_url;
                if(!s.post_content&&(r.post_content||r.content))s.post_content=r.post_content||r.content;
                console.log('✅ Grouped:',sn,'EP',en,'msgId:',mid);
            }
        }else{sa.push(r);}
    });
    
    sm.forEach(s=>{
        s.episodes.sort((a,b)=>(parseInt(a.episodeNumber)||0)-(parseInt(b.episodeNumber)||0));
        if(!s.has_file)s.has_file=s.episodes.some(ep=>ep.has_file===true||(ep.file_size&&ep.file_size>0));
        const fep=s.episodes[0];
        console.log('📺 SERIES:',s.seriesName,'eps:',s.episodes.length,'1st msgId:',getMsgId(fep),'1st real_message_id:',fep?fep.real_message_id:'N/A');
        grouped.push(s);
    });
    console.log('📊 FINAL: grouped='+grouped.length+' standalone='+sa.length);
    return{grouped,standalone:sa};
}

// ====== GENERATE EPISODES DROPDOWN ======
function ged(eps,i){
    if(!eps||!Array.isArray(eps)||eps.length===0)return'';
    console.log('📺 DROPDOWN idx:'+i+' total:'+eps.length);
    let h='<div class="episodes-dropdown" id="ed-'+i+'" style="display:none;"><div class="episodes-grid">';
    let cnt=0;
    eps.forEach((ep,ei)=>{
        const en=ep.episodeNumber||(ei+1),esz=ep.file_size?fs(ep.file_size):'';
        const mid=getMsgId(ep);
        console.log('🔍 EP'+en+' msgId:'+mid+' real_message_id:'+ep.real_message_id);
        const sp=CHID+'_'+mid;
        const tl='https://t.me/'+BOT+'?start='+encodeURIComponent(sp);
        const pn=String(en).padStart(2,'0'),bd=!seen?'<span class="episode-badge">NEW</span>':'';
        h+='<div class="episode-chip '+gc(en)+'" onclick="hqc(\''+tl.replace(/'/g,"\\'")+'\')"><span class="episode-chip-label">EP '+pn+'</span>'+(esz?'<span class="episode-chip-size">'+esz+'</span>':'')+bd+'</div>';
        cnt++;
    });
    h+='</div></div>';
    console.log('📺 Generated '+cnt+' buttons');
    return h;
}

function hqc(tl){
    if(!tl)return;tsl();
    if(seen){window.open(tl,'_blank');return;}
    localStorage.setItem(RKEY,'true');seen=true;pl=tl;rc=3;
    document.getElementById('redirectTimer').textContent=3;document.getElementById('redirectProgressBar').style.width='0%';
    document.getElementById('redirectOverlay').classList.add('active');
    setTimeout(()=>{document.getElementById('redirectProgressBar').style.width='100%';},50);
    if(rt)clearInterval(rt);
    rt=setInterval(()=>{rc--;document.getElementById('redirectTimer').textContent=rc;if(rc<=0){clearInterval(rt);window.open(pl,'_blank');cr();}},1000);
}
function te(i){const d=document.getElementById('ed-'+i);if(d)d.style.display=d.style.display==='block'?'none':'block';}
function cr(){if(rt){clearInterval(rt);rt=null;}document.getElementById('redirectOverlay').classList.remove('active');pl='';}

async function fa(q,p){for(let i=0;i<API.length;i++){try{const r=await fetch(API[i]+'/api/search?query='+encodeURIComponent(q)+'&page='+p+'&limit='+RPP,{signal:AbortSignal.timeout(10000)});if(r.ok){const d=await r.json();if(d.status==='success')return d;}}catch(e){}}return null;}

async function ps(page=1){
    const rc=document.getElementById('resultsContainer'),ri=document.getElementById('resultsInfo'),pc=document.getElementById('paginationContainer');
    let q=gq();
    if(!q){rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#0cf;"></i><h4>Enter a search term</h4></div>';return;}
    cq=q;cp=page;
    rc.innerHTML='<div class="results-loading"><div class="spinner"></div><p style="color:#0cf;">Searching...</p></div>';
    const ck=q+'-'+page;
    if(cache.has(ck)){const c=cache.get(ck);rr(c.results,c.pagination);return;}
    try{
        const d=await fa(q,page);
        if(d&&d.results&&d.results.length>0){
            console.log('📦 API returned',d.results.length,'results');
            const{grouped,standalone}=groupEpisodesBySeries(d.results);
            const pr={grouped,standalone};
            cache.set(ck,{results:pr,pagination:d.pagination});
            rr(pr,d.pagination);
        }else{rc.innerHTML='<div class="error-state"><i class="fas fa-search fa-3x mb-3" style="color:#0cf;"></i><h4>No results found</h4></div>';}
    }catch(e){rc.innerHTML='<div class="error-state"><i class="fas fa-exclamation-triangle fa-3x mb-3" style="color:#ff6b6b;"></i><h4>Connection Error</h4><button onclick="ps('+page+')" style="background:#0cf;border:none;padding:10px 25px;border-radius:4px;color:#000;font-weight:600;cursor:pointer;">Retry</button></div>';}
}

function rr(pr,pag){
    const rc=document.getElementById('resultsContainer'),ri=document.getElementById('resultsInfo'),pc=document.getElementById('paginationContainer');
    const{grouped:series,standalone}=pr;
    const total=(series?series.length:0)+(standalone?standalone.length:0);
    console.log('🎬 RENDER total:'+total+' series:'+(series?.length||0)+' standalone:'+(standalone?.length||0));
    if(total===0){rc.innerHTML='<div class="error-state"><h4>No results found</h4></div>';return;}
    if(ri&&pag){ri.innerHTML='Found <strong>'+total+'</strong> results · Page '+pag.current_page+' of '+pag.total_pages;ri.style.display='block';}
    let h='',ci=0;
    
    // SERIES
    if(series)series.forEach(s=>{
        const st=s.seriesName,tu=s.thumbnail||FTHUMB,eps=s.episodes||[],ec=eps.length;
        let hf=s.has_file;if(!hf&&ec)hf=eps.some(e=>e.has_file||e.file_size);
        const fmi=eps[0]?getMsgId(eps[0]):'0';
        console.log('🎬 Series card:',st,'eps:',ec,'1st msgId:',fmi);
        h+='<div class="result-card"><div class="result-thumbnail-top"><div class="thumbnail-container" onclick="tal()"><img src="'+tu+'" alt="'+eh(st)+'" onerror="this.src=\''+FTHUMB+'\'"><div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>'+(hf?'<div class="video-file-badge">SK4FiLM</div>':'')+'</div></div><h3 class="result-title">'+eh(st)+' <small style="color:#888;">('+ec+' eps)</small></h3>';
        if(s.post_content)h+=createPostContent(s.post_content,ci);
        if(ec>0){
            h+='<div class="action-buttons-container"><a href="view.html?channel_id='+CHID+'&message_id='+fmi+'" target="_blank" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a><button class="btn-download-main" onclick="te('+ci+')"><i class="fas fa-download"></i> Episodes <span class="episode-count-badge">'+ec+'</span></button></div>';
            h+=ged(eps,ci);
        }else{
            const fl='https://t.me/'+BOT+'?start='+CHID+'_'+fmi;
            h+='<div class="action-buttons-container"><a href="view.html?channel_id='+CHID+'&message_id='+fmi+'" target="_blank" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a><button class="btn-download-main" onclick="hqc(\''+fl+'\')"><i class="fas fa-download"></i> Download</button></div>';
        }
        h+='</div>';ci++;
    });
    
    // STANDALONE
    if(standalone)standalone.forEach(r=>{
        const t=r.title||'Untitled',tu=r.thumbnail_url||r.poster_url||FTHUMB;
        const hf=r.has_file||r.file_size,mid=getMsgId(r);
        h+='<div class="result-card"><div class="result-thumbnail-top"><div class="thumbnail-container" onclick="tal()"><img src="'+tu+'" alt="'+eh(t)+'" onerror="this.src=\''+FTHUMB+'\'"><div class="play-overlay"><div class="play-button"><i class="fas fa-play"></i></div></div>'+(hf?'<div class="video-file-badge">SK4FiLM</div>':'')+'</div></div><h3 class="result-title">'+eh(t)+'</h3>';
        if(r.post_content||r.content)h+=createPostContent(r.post_content||r.content,ci);
        const fl='https://t.me/'+BOT+'?start='+CHID+'_'+mid;
        h+='<div class="action-buttons-container"><a href="view.html?channel_id='+CHID+'&message_id='+mid+'" target="_blank" class="btn-stream-now"><i class="fas fa-play-circle"></i> Watch Now</a><button class="btn-download-main" onclick="hqc(\''+fl+'\')"><i class="fas fa-download"></i> Download</button></div></div>';ci++;
    });
    
    rc.innerHTML=h;
    if(pag&&pag.total_pages>1)rp(pag);else pc.innerHTML='';
}

function createPostContent(c,i){if(!c||!c.trim())return'';const L=c.length>1200;let f=eh(c);f=f.replace(/\n/g,'<br>');f=f.replace(/(https?:\/\/[^\s<]+)/g,m=>'<a href="'+m+'" target="_blank" rel="noopener noreferrer" style="color:#0cf;text-decoration:underline;">'+m+'</a>');let h='<div class="result-post-content"><div class="post-text" style="max-height:'+(L?'150px':'none')+';overflow:hidden;">'+f+'</div>';if(L)h+='<div class="fade-effect"></div><button class="show-more-btn" onclick="var t=this.parentElement.querySelector(\'.post-text\');var f=this.parentElement.querySelector(\'.fade-effect\');if(t.style.maxHeight===\'none\'){t.style.maxHeight=\'150px\';f.style.display=\'block\';this.innerHTML=\'<i class=fa-chevron-down></i> Show More ↓\';}else{t.style.maxHeight=\'none\';f.style.display=\'none\';this.innerHTML=\'<i class=fa-chevron-up></i> Show Less ↑\';}"><i class="fas fa-chevron-down"></i> Show More ↓</button>';return h+'</div>';}

function rp(pag){const pc=document.getElementById('paginationContainer');if(!pc)return;let p='<nav><ul style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;list-style:none;padding:0;margin:20px 0;">';p+='<li><a class="page-link '+(pag.has_previous?'':'disabled')+'" onclick="'+(pag.has_previous?'changePage('+(pag.current_page-1)+')':'')+'">«</a></li>';for(let i=1;i<=pag.total_pages;i++){if(i===1||i===pag.total_pages||(i>=pag.current_page-2&&i<=pag.current_page+2))p+='<li class="page-item '+(i===pag.current_page?'active':'')+'"><a class="page-link" onclick="changePage('+i+')">'+i+'</a></li>';else if(i===pag.current_page-3||i===pag.current_page+3)p+='<li><span style="padding:8px 12px;color:rgba(255,255,255,.3);">…</span></li>';}p+='<li><a class="page-link '+(pag.has_next?'':'disabled')+'" onclick="'+(pag.has_next?'changePage('+(pag.current_page+1)+')':'')+'">»</a></li></ul></nav>';pc.innerHTML=p;}

window.changePage=function(page){if(page>0){ps(page);window.scrollTo({top:0,behavior:'smooth'});}};
document.getElementById('searchButton').addEventListener('click',e=>{e.preventDefault();ps(1);});
document.getElementById('searchInput').addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();ps(1);}});
window.addEventListener('load',()=>{const p=new URLSearchParams(window.location.search);const q=p.get('query');if(q){document.getElementById('searchInput').value=q;ps(parseInt(p.get('page'))||1);}});

window.te=te;window.hqc=hqc;window.cr=cr;window.ps=ps;window.toggleMenu=toggleMenu;window.tal=tal;
</script>
<script type="text/javascript">aclib.runAutoTag({zoneId:'upm8dczty'});</script>
